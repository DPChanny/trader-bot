name: redis

services:
  redis:
    image: redis:7.0.15
    container_name: trader-bot-ctr-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - trader-bot-dev-vol-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  trader-bot-dev-vol-redis:
    name: trader-bot-dev-vol-redis
