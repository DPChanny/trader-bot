# =============================================================================
# Network
# =============================================================================
bind 127.0.0.1
port 6379
protected-mode yes
tcp-backlog 128
timeout 0
tcp-keepalive 300

# =============================================================================
# Memory
# =============================================================================
# t4g.small (2 GB RAM): OS ~200 MB + auction worker ~150 MB + headroom ~450 MB
maxmemory 1200mb

# noeviction: auction state keys must never be silently evicted.
# On OOM Redis returns an error, which is detectable — data loss is not.
maxmemory-policy noeviction

# =============================================================================
# Persistence — fully disabled (volatile only)
# =============================================================================
save ""
appendonly no
rdbchecksum no

# =============================================================================
# Clients
# =============================================================================
# Only auction worker + 2 backend instances connect.
# Low ceiling catches connection leaks early.
maxclients 100

# =============================================================================
# Logging
# =============================================================================
# Log to stdout so systemd / Docker captures output.
loglevel notice
logfile ""
