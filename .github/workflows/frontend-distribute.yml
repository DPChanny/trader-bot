name: vite-frontend

on:
  push:
    branches: ["master"]
    tags: ["v*"]
    paths:
      - "vite/public/**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version"
        required: false

concurrency:
  group: vite-frontend
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.sha }}

      - name: Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: vite/package-lock.json

      - name: Prepare
        id: prepare
        run: |
          {
            echo "VITE_API_ORIGIN=https://${{ vars.DOMAIN }}"
            echo "VITE_DISCORD_CLIENT_ID=${{ vars.DISCORD_CLIENT_ID }}"
            echo "VITE_GUILD_INVITE_URL=${{ vars.GUILD_INVITE_URL }}"
            echo "S3_BUCKET=${{ vars.S3_BUCKET_NAME }}"
            echo "CLOUDFRONT_DISTRIBUTION_ID=${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}"
          } >> "$GITHUB_OUTPUT"

      - name: Validate
        run: |
          VITE_API_ORIGIN="${{ steps.prepare.outputs.VITE_API_ORIGIN }}"
          VITE_DISCORD_CLIENT_ID="${{ steps.prepare.outputs.VITE_DISCORD_CLIENT_ID }}"
          VITE_GUILD_INVITE_URL="${{ steps.prepare.outputs.VITE_GUILD_INVITE_URL }}"
          S3_BUCKET="${{ steps.prepare.outputs.S3_BUCKET }}"
          CLOUDFRONT_DISTRIBUTION_ID="${{ steps.prepare.outputs.CLOUDFRONT_DISTRIBUTION_ID }}"

          MISSING=0
          for VAR in VITE_API_ORIGIN VITE_DISCORD_CLIENT_ID VITE_GUILD_INVITE_URL S3_BUCKET CLOUDFRONT_DISTRIBUTION_ID; do
            if [ -z "${!VAR}" ]; then
              echo "Missing required variable: $VAR"
              MISSING=1
            fi
          done

          if [ "$MISSING" -ne 0 ]; then
            exit 1
          fi

      - name: Run
        working-directory: vite
        env:
          VITE_API_ORIGIN: ${{ steps.prepare.outputs.VITE_API_ORIGIN }}
          VITE_DISCORD_CLIENT_ID: ${{ steps.prepare.outputs.VITE_DISCORD_CLIENT_ID }}
          VITE_GUILD_INVITE_URL: ${{ steps.prepare.outputs.VITE_GUILD_INVITE_URL }}
          S3_BUCKET: ${{ steps.prepare.outputs.S3_BUCKET }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ steps.prepare.outputs.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          npm ci
          npm run build
          cd ..
          aws s3 sync vite/dist s3://$S3_BUCKET --delete
          aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --paths "/*"
