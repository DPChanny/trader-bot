name: CI PM2

on:
  push:
    branches: ["master"]
    paths:
      - "ecosystem.config.mjs"
  workflow_dispatch:

concurrency:
  group: ci-pm2
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: CI
        env:
          INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
        run: |
          PM2_CMD="sudo -u ubuntu -H bash -l -c '\
            pm2 delete trader-bot-prod-pm2-backend 2>/dev/null || true && \
            pm2 delete trader-bot-prod-pm2-bot 2>/dev/null || true && \
            pm2 start /var/www/trader-bot/ecosystem.config.mjs && \
            pm2 save'"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$(jq -n \
                --arg pm2cmd "$PM2_CMD" \
                '{commands: ["set -e", $pm2cmd]}')" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || FAILED=1

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '[Status,StandardOutputContent,StandardErrorContent]' \
            --output text

          test -z "$FAILED"
