name: deploy-pm2

on:
  push:
    branches: ["master"]
    paths:
      - "python/aws/ecosystem.config.mjs"
  workflow_dispatch:

concurrency:
  group: deploy-pm2
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy
        run: |
          INSTANCE_ID="${{ vars.EC2_INSTANCE_ID }}"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$(jq -n \
                '{commands: [
                  "set -e",
                  "if id ubuntu >/dev/null 2>&1; then sudo --login --user ubuntu bash -lc '\''pm2 delete trader-bot-prod-pm2-backend 2>/dev/null || true && pm2 delete trader-bot-prod-pm2-bot 2>/dev/null || true && pm2 start /var/www/trader-bot/python/aws/ecosystem.config.mjs && pm2 save'\''; else bash -lc '\''pm2 delete trader-bot-prod-pm2-backend 2>/dev/null || true && pm2 delete trader-bot-prod-pm2-bot 2>/dev/null || true && pm2 start /var/www/trader-bot/python/aws/ecosystem.config.mjs && pm2 save'\''; fi"
                ]}')" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || FAILED=1

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '[Status,StandardOutputContent,StandardErrorContent]' \
            --output text

          test -z "$FAILED"
