name: deploy-pm2

on:
  push:
    branches: ["master"]
    paths:
      - "infra/pm2/ecosystem.config.mjs"
  workflow_dispatch:

concurrency:
  group: deploy-pm2
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy
        run: |
          INSTANCE_ID="${{ vars.EC2_INSTANCE_ID }}"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$(jq -n \
                '{commands: [
                  "set -e",
                  "cat <<'\''EOF'\'' > /tmp/trader-bot-deploy-pm2.sh",
                  "set -e",
                  "pm2 startOrReload /var/www/trader-bot/infra/pm2/ecosystem.config.mjs",
                  "pm2 save",
                  "EOF",
                  "chmod 700 /tmp/trader-bot-deploy-pm2.sh",
                  "sudo -iu ubuntu bash /tmp/trader-bot-deploy-pm2.sh",
                  "rm -f /tmp/trader-bot-deploy-pm2.sh"
                ]}')" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || FAILED=1

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '[Status,StandardOutputContent,StandardErrorContent]' \
            --output text

          test -z "$FAILED"
