name: infra-deploy-nginx

on:
  workflow_dispatch:
    inputs:
      instance_ids:
        description: "Target EC2 instance ids (comma or space separated)"
        required: false
      tag:
        description: "Tag or branch to apply (default: master)"
        required: false

concurrency:
  group: infra-deploy-nginx
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="master"
          fi
          INSTANCE_IDS_RAW="${{ inputs.instance_ids || vars.NGINX_INSTANCE_ID }}"
          INSTANCE_IDS=$(echo "$INSTANCE_IDS_RAW" | tr ',\n' '  ' | xargs)

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No instance ids provided. Set input instance_ids or vars.NGINX_INSTANCE_ID"
            exit 1
          fi

          COMMANDS_JSON=$(jq -n \
            --arg tag "$TAG" \
            --arg appRoot "/var/www/trader-bot" \
            '{commands: [
              "set -e",
              ("cd " + $appRoot),
              "git fetch --all --tags origin",
              "if git rev-parse --verify --quiet refs/tags/" + $tag + " >/dev/null; then git checkout --detach " + $tag + "; else git checkout --detach origin/" + $tag + "; fi",
              "install -d /etc/nginx/sites-available /etc/nginx/sites-enabled",
              "install -m 644 infra/nginx/sites-avaliable/trader-bot.conf /etc/nginx/sites-available/trader-bot.conf",
              "ln -sfn /etc/nginx/sites-available/trader-bot.conf /etc/nginx/sites-enabled/trader-bot.conf",
              "nginx -t",
              "systemctl reload nginx"
            ]}')

          FAILED=0
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "[infra-deploy-nginx] instance=$INSTANCE_ID"
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters "$COMMANDS_JSON" \
              --query "Command.CommandId" \
              --output text)

            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" || FAILED=1

            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '[Status,StandardOutputContent,StandardErrorContent]' \
              --output text
          done

          test "$FAILED" -eq 0
