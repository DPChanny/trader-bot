name: infra-deploy-nginx

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Version"
        required: true
      target:
        description: "Target(backend, bot, all)"
        required: false

concurrency:
  group: infra-deploy-nginx
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy
        run: |
          TAG="${{ inputs.tag }}"
          TARGET="${{ inputs.target || 'all' }}"

          case "$TARGET" in
            backend|bot|all)
              ;;
            *)
              echo "Invalid target: $TARGET (expected backend, bot, all)"
              exit 1
              ;;
          esac

          if [ "$TARGET" = "bot" ]; then
            echo "[infra-deploy-nginx] target=bot has no nginx dependency. Skipping."
            exit 0
          fi

          INSTANCE_IDS=$(printf '%s\n' "${{ vars.NGINX_INSTANCE_ID }}" | awk 'NF' | sort -u | xargs)

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No instance ids provided. Set vars.NGINX_INSTANCE_ID"
            exit 1
          fi

          COMMANDS_JSON=$(jq -n \
            --arg tag "$TAG" \
            --arg appRoot "/var/www/trader-bot" \
            '{commands: [
              "set -e",
              ("cd " + $appRoot),
              "git fetch --all --tags origin",
              "if git rev-parse --verify --quiet refs/tags/" + $tag + " >/dev/null; then git checkout --detach " + $tag + "; else git checkout --detach origin/" + $tag + "; fi",
              "install -d /etc/nginx/sites-available /etc/nginx/sites-enabled",
              "install -m 644 infra/nginx/sites-avaliable/trader-bot.conf /etc/nginx/sites-available/trader-bot.conf",
              "ln -sfn /etc/nginx/sites-available/trader-bot.conf /etc/nginx/sites-enabled/trader-bot.conf",
              "nginx -t",
              "systemctl reload nginx"
            ]}')

          FAILED=0
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "[infra-deploy-nginx] instance=$INSTANCE_ID target=$TARGET"
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters "$COMMANDS_JSON" \
              --query "Command.CommandId" \
              --output text)

            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" || FAILED=1

            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '[Status,StandardOutputContent,StandardErrorContent]' \
              --output text
          done

          test "$FAILED" -eq 0
