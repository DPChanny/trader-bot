name: Deploy Version

on:
  push:
    tags: ["v*"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync Version
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SECRET }}
          script: |
            set -e

            cd /var/www/trader-bot
            git fetch --tags origin
            git checkout --detach "${{ github.ref_name }}"

      - name: Python .env
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SECRET }}
          script: |
            set -e

            cd /var/www/trader-bot
            cat << EOF > python/.env
            DISCORD_BOT_TOKEN=${{ secrets.DISCORD_BOT_TOKEN }}
            DISCORD_CLIENT_ID=${{ secrets.DISCORD_CLIENT_ID }}
            DISCORD_CLIENT_SECRET=${{ secrets.DISCORD_CLIENT_SECRET }}
            APP_ORIGIN=https://${{ vars.EC2_HOST }}
            API_ORIGIN=https://${{ vars.EC2_HOST }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DB_HOST=${{ vars.DB_HOST }}
            AWS_REGION=${{ vars.AWS_REGION }}
            EOF

            if [ -n "${{ vars.LOG_LEVEL }}" ]; then
              echo "LOG_LEVEL=${{ vars.LOG_LEVEL }}" >> python/.env
            fi

      - name: Frontend .env
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SECRET }}
          script: |
            set -e

            cd /var/www/trader-bot
            cat << EOF > frontend/.env
            VITE_API_ORIGIN=https://${{ vars.EC2_HOST }}
            VITE_WS_ORIGIN=wss://${{ vars.EC2_HOST }}
            VITE_DISCORD_CLIENT_ID=${{ secrets.DISCORD_CLIENT_ID }}
            VITE_GUILD_INVITE_URL=${{ vars.GUILD_INVITE_URL}}
            EOF

      - name: Python Dependencies
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SECRET }}
          script: |
            set -e

            cd /var/www/trader-bot/python
            uv sync

      - name: Frontend Dependencies
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SECRET }}
          script: |
            set -e

            cd /var/www/trader-bot/frontend
            npm install

      - name: Build Frontend
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SECRET }}
          script: |
            set -e

            cd /var/www/trader-bot/frontend
            npm run build

      - name: Reload Backend PM2 Process
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SECRET }}
          script: |
            set -e

            cd /var/www/trader-bot/python
            pm2 reload trader-bot-backend || pm2 start "uv run python -m uvicorn backend.main:app --host localhost --port 8000" --name trader-bot-backend

      - name: Reload Bot PM2 Process
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SECRET }}
          script: |
            set -e

            cd /var/www/trader-bot/python
            pm2 reload trader-bot || pm2 start "uv run python -m bot.main" --name trader-bot

      - name: Save PM2 Process List
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SECRET }}
          script: |
            set -e

            pm2 save
