name: frontend-public-distribute

on:
  push:
    paths:
      - "vite/public/**"
  workflow_dispatch:

concurrency:
  group: frontend-public-distribute
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: vite/package-lock.json

      - name: Prepare
        id: prepare
        run: |
          {
            echo "api_origin=https://${{ vars.DOMAIN }}"
            echo "discord_client_id=${{ vars.DISCORD_CLIENT_ID }}"
            echo "guild_invite_url=${{ vars.GUILD_INVITE_URL }}"
            echo "s3_bucket=${{ vars.S3_BUCKET_NAME }}"
          } >> "$GITHUB_OUTPUT"

      - name: Validate
        run: |
          VITE_API_ORIGIN="${{ steps.prepare.outputs.api_origin }}"
          VITE_DISCORD_CLIENT_ID="${{ steps.prepare.outputs.discord_client_id }}"
          VITE_GUILD_INVITE_URL="${{ steps.prepare.outputs.guild_invite_url }}"
          S3_BUCKET="${{ steps.prepare.outputs.s3_bucket }}"

          MISSING=0
          for VAR in VITE_API_ORIGIN VITE_DISCORD_CLIENT_ID VITE_GUILD_INVITE_URL S3_BUCKET; do
            if [ -z "${!VAR}" ]; then
              echo "Missing required variable: $VAR"
              MISSING=1
            fi
          done

          if [ "$MISSING" -ne 0 ]; then
            exit 1
          fi

      - name: Run
        working-directory: vite
        env:
          VITE_API_ORIGIN: ${{ steps.prepare.outputs.api_origin }}
          VITE_DISCORD_CLIENT_ID: ${{ steps.prepare.outputs.discord_client_id }}
          VITE_GUILD_INVITE_URL: ${{ steps.prepare.outputs.guild_invite_url }}
          S3_BUCKET: ${{ steps.prepare.outputs.s3_bucket }}
        run: |
          npm ci
          npm run build
          cd ..
          aws s3 sync vite/dist s3://$S3_BUCKET --delete
