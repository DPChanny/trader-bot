name: deploy-python-auction

on:
  workflow_call:
    inputs:
      phase:
        required: true
        type: string
      ref:
        required: false
        type: string
        default: "origin/master"
  workflow_dispatch:
    inputs:
      phase:
        description: "Phase"
        required: true
      ref:
        description: "Ref"
        required: false
        default: "origin/master"

concurrency:
  group: deploy-python-auction-${{ inputs.phase }}-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Prepare
        id: prepare
        env:
          DEPLOY_MAP: ${{ vars.DEPLOY_MAP }}
        run: |
          set -euo pipefail

          PHASE="${{ inputs.phase }}"
          REF="${{ inputs.ref }}"

          case "$PHASE" in
            beta|prod) ;;
            *)
              echo "Invalid phase: $PHASE"
              exit 1
              ;;
          esac

          INSTANCE_ID=$(printf '%s' "$DEPLOY_MAP" | jq -r --arg phase "$PHASE" '.[$phase].auction // empty')

          if [ -z "$INSTANCE_ID" ]; then
            echo "Missing DEPLOY_MAP value: .${PHASE}.auction"
            exit 1
          fi

          {
            echo "PHASE=$PHASE"
            echo "REF=$REF"
            echo "INSTANCE_ID=$INSTANCE_ID"
          } >> "$GITHUB_OUTPUT"

      - name: Run
        run: |
          set -euo pipefail
          PHASE="${{ steps.prepare.outputs.PHASE }}"
          REF="${{ steps.prepare.outputs.REF }}"
          INSTANCE_ID="${{ steps.prepare.outputs.INSTANCE_ID }}"

          COMMANDS_JSON=$(jq -n \
            --arg ref "$REF" \
            --arg repo "/home/ubuntu/trader-bot" \
            '{commands: (
              ($repo + "/python") as $python_dir |
              ($repo + "/infra/pm2/ecosystem.config.mjs") as $ecosystem |
              [
              "set -e",
              ("cd " + $repo),
              ("sudo -H -u ubuntu git -C " + $repo + " fetch --all --tags"),
              ("sudo -H -u ubuntu git -C " + $repo + " checkout --detach " + $ref),
              ("sudo -H -u ubuntu bash -lc \"uv sync --frozen --project " + $python_dir + "\""),
              ("sudo -H -u ubuntu pm2 startOrReload " + $ecosystem + " --only trader-bot-pm2-auction"),
              "sudo -H -u ubuntu pm2 save"
            ])}')

          echo "[deploy-python-auction] phase=$PHASE instance=$INSTANCE_ID"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$COMMANDS_JSON" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || true

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '[Status,StandardOutputContent,StandardErrorContent]' \
            --output text

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'Status' \
            --output text)

          test "$STATUS" = "Success"
