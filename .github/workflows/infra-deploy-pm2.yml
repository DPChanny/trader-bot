name: infra-deploy-pm2

on:
  push:
    paths:
      - "infra/pm2/**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version"
        required: true
      target:
        description: "Target(backend, bot, all)"
        required: false
        default: "all"

concurrency:
  group: infra-deploy-pm2
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF="${{ inputs.tag }}"
            TARGET="${{ inputs.target || 'all' }}"
          else
            REF="${{ github.sha }}"
            TARGET="all"
          fi
          INSTANCE_IDS=$(printf '%s\n%s\n%s\n' \
            "${{ vars.NGINX_INSTANCE_ID }}" \
            "${{ vars.CLOUDWATCH_INSTANCE_ID }}" \
            "${{ vars.PM2_INSTANCE_ID }}" | awk 'NF' | sort -u | xargs)

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No instance ids provided. Set vars.NGINX_INSTANCE_ID and/or vars.CLOUDWATCH_INSTANCE_ID and/or vars.PM2_INSTANCE_ID"
            exit 1
          fi

          case "$TARGET" in
            backend|bot|all)
              ;;
            *)
              echo "Invalid target: $TARGET (expected backend, bot, all)"
              exit 1
              ;;
          esac

          FAILED=0
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "[infra-deploy-pm2] instance=$INSTANCE_ID target=$TARGET"
            COMMANDS_JSON=$(jq -n \
              --arg ref "$REF" \
              --arg appRoot "/var/www/trader-bot" \
              --arg target "$TARGET" \
              '{commands: [
                "set -e",
                ("cd " + $appRoot),
                ("git fetch --all --tags origin && git checkout --detach " + $ref),
                "install -d /var/www/trader-bot/python/aws",
                "ln -sfn /var/www/trader-bot/infra/pm2/ecosystem.config.mjs /var/www/trader-bot/python/aws/ecosystem.config.mjs",
                "cat <<'\''EOF'\'' > /tmp/trader-bot-infra-pm2.sh",
                "set -e",
                "pm2 startup systemd -u ubuntu --hp /home/ubuntu || true",
                "if [ \"" + $target + "\" = \"backend\" ]; then pm2 startOrReload /var/www/trader-bot/infra/pm2/ecosystem.config.mjs --only trader-bot-prod-pm2-backend; elif [ \"" + $target + "\" = \"bot\" ]; then pm2 startOrReload /var/www/trader-bot/infra/pm2/ecosystem.config.mjs --only trader-bot-prod-pm2-bot; else pm2 startOrReload /var/www/trader-bot/infra/pm2/ecosystem.config.mjs; fi",
                "pm2 save",
                "EOF",
                "chmod 700 /tmp/trader-bot-infra-pm2.sh",
                "sudo -iu ubuntu bash /tmp/trader-bot-infra-pm2.sh",
                "rm -f /tmp/trader-bot-infra-pm2.sh",
                "systemctl enable pm2-ubuntu || true",
                "systemctl restart pm2-ubuntu || true"
              ]}')

            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters "$COMMANDS_JSON" \
              --query "Command.CommandId" \
              --output text)

            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" || FAILED=1

            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '[Status,StandardOutputContent,StandardErrorContent]' \
              --output text
          done

          test "$FAILED" -eq 0
