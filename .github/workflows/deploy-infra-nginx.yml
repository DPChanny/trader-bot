name: deploy-infra-nginx

on:
  push:
    branches: ["master"]
    paths:
      - "infra/nginx/**"
  workflow_dispatch:
    inputs:
      phase:
        description: "Phase(beta, prod)"
        required: true
        default: "prod"
      ref:
        description: "Git ref (tag/branch/sha)"
        required: true

concurrency:
  group: deploy-infra-nginx-${{ inputs.phase || 'prod' }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Prepare
        id: prepare
        env:
          DEPLOY_MAP: ${{ vars.DEPLOY_MAP }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PHASE="${{ inputs.phase }}"
            REF="${{ inputs.ref }}"
          else
            PHASE="prod"
            REF="${{ github.sha }}"
          fi

          case "$PHASE" in
            beta|prod) ;;
            *)
              echo "Invalid phase: $PHASE"
              exit 1
              ;;
          esac

          if [ -z "${DEPLOY_MAP}" ]; then
            echo "Missing vars.DEPLOY_MAP"
            exit 1
          fi

          if ! printf '%s' "$REF" | grep -Eq '^[A-Za-z0-9._/-]+$'; then
            echo "Invalid ref format: $REF"
            exit 1
          fi
          if printf '%s' "$REF" | grep -Eq '^-'; then
            echo "Invalid ref format (cannot start with '-') : $REF"
            exit 1
          fi

          INSTANCE_IDS=$(printf '%s' "$DEPLOY_MAP" | jq -r --arg phase "$PHASE" '
            .[$phase].backend // empty |
            if type == "array" then .[] else . end
          ' | awk 'NF' | sort -u | xargs)

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No backend instance ids for phase=$PHASE in vars.DEPLOY_MAP"
            exit 1
          fi

          {
            echo "PHASE=$PHASE"
            echo "REF=$REF"
            echo "INSTANCE_IDS=$INSTANCE_IDS"
          } >> "$GITHUB_OUTPUT"

      - name: Run
        run: |
          set -euo pipefail
          PHASE="${{ steps.prepare.outputs.PHASE }}"
          REF="${{ steps.prepare.outputs.REF }}"
          INSTANCE_IDS="${{ steps.prepare.outputs.INSTANCE_IDS }}"

          COMMANDS_JSON=$(jq -n \
            --arg ref "$REF" \
            --arg phase "$PHASE" \
            --arg repo "/var/www/trader-bot" \
            '{commands: [
              "set -e",
              ("cd " + $repo),
              "sudo -iu ubuntu git fetch --all --tags",
              ("sudo -iu ubuntu git checkout --detach " + $ref),
              ("sudo install -m 644 infra/nginx/sites-available/trader-bot-" + $phase + "-nginx.conf /etc/nginx/sites-available/trader-bot.conf"),
              "sudo ln -sfn /etc/nginx/sites-available/trader-bot.conf /etc/nginx/sites-enabled/trader-bot.conf",
              "sudo nginx -t",
              "sudo systemctl enable nginx",
              "if sudo systemctl is-active --quiet nginx; then",
              "  sudo systemctl reload nginx",
              "else",
              "  sudo systemctl start nginx",
              "fi"
            ]}')

          FAILED=0
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "[deploy-infra-nginx] phase=$PHASE instance=$INSTANCE_ID"
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters "$COMMANDS_JSON" \
              --query "Command.CommandId" \
              --output text)

            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" || FAILED=1

            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '[Status,StandardOutputContent,StandardErrorContent]' \
              --output text
          done

          test "$FAILED" -eq 0
