name: python-backend

on:
  workflow_run:
    workflows: ["python-env"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version"
        required: true

concurrency:
  group: python
  cancel-in-progress: false

jobs:
  run:
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    steps:
      - name: Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Prepare
        id: prepare
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            REF="${{ github.event.workflow_run.head_sha }}"
          else
            REF="${{ inputs.tag || github.ref_name }}"
          fi
          INSTANCE_IDS=$(printf '%s\n%s\n%s\n' \
            "${{ vars.NGINX_INSTANCE_ID }}" \
            "${{ vars.CLOUDWATCH_INSTANCE_ID }}" \
            "${{ vars.PM2_INSTANCE_ID }}" | awk 'NF' | sort -u | xargs)

          {
            echo "ref=$REF"
            echo "instance_ids=$INSTANCE_IDS"
          } >> "$GITHUB_OUTPUT"

      - name: Validate
        run: |
          REF="${{ steps.prepare.outputs.ref }}"
          INSTANCE_IDS="${{ steps.prepare.outputs.instance_ids }}"

          if [ -z "$REF" ]; then
            echo "Missing ref from prepare"
            exit 1
          fi

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No instance ids provided. Set vars.NGINX_INSTANCE_ID and/or vars.CLOUDWATCH_INSTANCE_ID and/or vars.PM2_INSTANCE_ID"
            exit 1
          fi

      - name: Run
        run: |
          REF="${{ steps.prepare.outputs.ref }}"
          INSTANCE_IDS="${{ steps.prepare.outputs.instance_ids }}"

          COMMANDS_JSON=$(jq -n \
            --arg ref "$REF" \
            --arg repo "/var/www/trader-bot" \
            '{commands: [
              "set -e",
              ("cd " + $repo),
              ("git fetch --tags origin && git checkout --detach " + $ref),
              "cat <<'\''EOF'\'' > /tmp/trader-bot-run-backend.sh",
              "set -e",
              "cd /var/www/trader-bot/python",
              "uv sync --frozen",
              "pm2 startOrReload /var/www/trader-bot/infra/pm2/ecosystem.config.mjs --only trader-bot-prod-pm2-backend",
              "pm2 save",
              "EOF",
              "chmod 700 /tmp/trader-bot-run-backend.sh",
              "sudo -iu ubuntu bash /tmp/trader-bot-run-backend.sh",
              "rm -f /tmp/trader-bot-run-backend.sh"
            ]}')

          FAILED=0
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "[python-backend] instance=$INSTANCE_ID"
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters "$COMMANDS_JSON" \
              --query "Command.CommandId" \
              --output text)

            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" || FAILED=1

            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '[Status,StandardOutputContent,StandardErrorContent]' \
              --output text
          done

          test "$FAILED" -eq 0
