name: deploy-infra-cloudwatch

on:
  push:
    branches: ["master"]
    paths:
      - "infra/cloudwatch/**"
  workflow_dispatch:
    inputs:
      phase:
        description: "Phase(beta, prod)"
        required: true
        default: "prod"
      ref:
        description: "Git ref (tag/branch/sha)"
        required: true
      target:
        description: "Target(backend, bot, all)"
        required: false
        default: "all"

concurrency:
  group: deploy-infra-cloudwatch-${{ inputs.phase || 'prod' }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Prepare
        id: prepare
        env:
          DEPLOY_MAP: ${{ vars.DEPLOY_MAP }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PHASE="${{ inputs.phase }}"
            REF="${{ inputs.ref }}"
            TARGET="${{ inputs.target || 'all' }}"
          else
            PHASE="prod"
            REF="${{ github.sha }}"
            TARGET="all"
          fi

          case "$PHASE" in
            beta|prod) ;;
            *)
              echo "Invalid phase: $PHASE"
              exit 1
              ;;
          esac

          case "$TARGET" in
            backend|bot|all) ;;
            *)
              echo "Invalid target: $TARGET"
              exit 1
              ;;
          esac

          if [ -z "${DEPLOY_MAP}" ]; then
            echo "Missing vars.DEPLOY_MAP"
            exit 1
          fi

          if ! printf '%s' "$REF" | grep -Eq '^[A-Za-z0-9._/-]+$'; then
            echo "Invalid ref format: $REF"
            exit 1
          fi
          if printf '%s' "$REF" | grep -Eq '^-'; then
            echo "Invalid ref format (cannot start with '-') : $REF"
            exit 1
          fi

          if [ "$TARGET" = "backend" ]; then
            INSTANCE_IDS=$(printf '%s' "$DEPLOY_MAP" | jq -r --arg phase "$PHASE" '
              .[$phase].backend // empty |
              if type == "array" then .[] else . end
            ' | awk 'NF' | sort -u | xargs)
          elif [ "$TARGET" = "bot" ]; then
            INSTANCE_IDS=$(printf '%s' "$DEPLOY_MAP" | jq -r --arg phase "$PHASE" '
              .[$phase].bot // empty |
              if type == "array" then .[] else . end
            ' | awk 'NF' | sort -u | xargs)
          else
            INSTANCE_IDS=$(printf '%s' "$DEPLOY_MAP" | jq -r --arg phase "$PHASE" '
              [
                (.[$phase].backend // empty),
                (.[$phase].bot // empty)
              ]
              | map(if type == "array" then .[] else . end)
              | .[]
            ' | awk 'NF' | sort -u | xargs)
          fi

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No instance ids for phase=$PHASE target=$TARGET in vars.DEPLOY_MAP"
            exit 1
          fi

          {
            echo "PHASE=$PHASE"
            echo "REF=$REF"
            echo "TARGET=$TARGET"
            echo "INSTANCE_IDS=$INSTANCE_IDS"
          } >> "$GITHUB_OUTPUT"

      - name: Run
        run: |
          set -euo pipefail
          PHASE="${{ steps.prepare.outputs.PHASE }}"
          REF="${{ steps.prepare.outputs.REF }}"
          TARGET="${{ steps.prepare.outputs.TARGET }}"
          INSTANCE_IDS="${{ steps.prepare.outputs.INSTANCE_IDS }}"

          COMMANDS_JSON=$(jq -n \
            --arg ref "$REF" \
            --arg target "$TARGET" \
            --arg phase "$PHASE" \
            --arg repo "/var/www/trader-bot" \
            '{commands: [
              "set -e",
              ("cd " + $repo),
              "sudo -iu ubuntu git fetch --all --tags",
              ("sudo -iu ubuntu git checkout --detach " + $ref),
              "cat <<'"'"'EOF'"'"' > /tmp/deploy-infra-cloudwatch.sh",
              "set -e",
              "sudo install -d /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d",
              "sudo install -m 644 /var/www/trader-bot/infra/cloudwatch/amazon-cloudwatch-agent.d/agent.json /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/agent.json",
              "if [ \"" + $target + "\" = \"backend\" ] || [ \"" + $target + "\" = \"all\" ]; then",
              ("  sudo install -m 644 /var/www/trader-bot/infra/cloudwatch/amazon-cloudwatch-agent.d/trader-bot-" + $phase + "-lg-backend.json /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/trader-bot-" + $phase + "-lg-backend.json"),
              "fi",
              "if [ \"" + $target + "\" = \"bot\" ] || [ \"" + $target + "\" = \"all\" ]; then",
              ("  sudo install -m 644 /var/www/trader-bot/infra/cloudwatch/amazon-cloudwatch-agent.d/trader-bot-" + $phase + "-lg-bot.json /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/trader-bot-" + $phase + "-lg-bot.json"),
              "fi",
              "sudo /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a fetch-config -m ec2 -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/agent.json -s",
              "if [ \"" + $target + "\" = \"backend\" ] || [ \"" + $target + "\" = \"all\" ]; then",
              ("  sudo /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a append-config -m ec2 -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/trader-bot-" + $phase + "-lg-backend.json"),
              "fi",
              "if [ \"" + $target + "\" = \"bot\" ] || [ \"" + $target + "\" = \"all\" ]; then",
              ("  sudo /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a append-config -m ec2 -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/trader-bot-" + $phase + "-lg-bot.json"),
              "fi",
              "EOF",
              "chmod 700 /tmp/deploy-infra-cloudwatch.sh",
              "sudo -iu ubuntu bash /tmp/deploy-infra-cloudwatch.sh",
              "rm -f /tmp/deploy-infra-cloudwatch.sh"
            ]}')

          FAILED=0
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "[deploy-infra-cloudwatch] phase=$PHASE target=$TARGET instance=$INSTANCE_ID"
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters "$COMMANDS_JSON" \
              --query "Command.CommandId" \
              --output text)

            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" || FAILED=1

            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '[Status,StandardOutputContent,StandardErrorContent]' \
              --output text
          done

          test "$FAILED" -eq 0
