name: deploy-python-bot

on:
  workflow_call:
    inputs:
      phase:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      phase:
        description: "Phase"
        required: true

concurrency:
  group: deploy-python-bot-${{ inputs.phase }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Prepare
        id: prepare
        env:
          DEPLOY_MAP: ${{ vars.DEPLOY_MAP }}
        run: |
          set -euo pipefail

          PHASE="${{ inputs.phase }}"

          case "$PHASE" in
            beta|prod) ;;
            *)
              echo "Invalid phase: $PHASE"
              exit 1
              ;;
          esac

          INSTANCE_ID=$(printf '%s' "$DEPLOY_MAP" | jq -r --arg phase "$PHASE" '.[$phase].bot // empty')

          if [ -z "$INSTANCE_ID" ]; then
            echo "Missing DEPLOY_MAP value: .${PHASE}.bot"
            exit 1
          fi

          {
            echo "INSTANCE_ID=$INSTANCE_ID"
          } >> "$GITHUB_OUTPUT"

      - name: Run
        run: |
          set -euo pipefail
          INSTANCE_ID="${{ steps.prepare.outputs.INSTANCE_ID }}"

          COMMANDS_JSON=$(jq -n \
            '{commands: (
              "/home/ubuntu/trader-bot/infra/pm2/ecosystem.config.mjs" as $ecosystem |
              [
              "set -e",
              ("sudo -H -u ubuntu pm2 startOrReload " + $ecosystem + " --only trader-bot-pm2-bot"),
              "sudo -H -u ubuntu pm2 reset trader-bot-pm2-bot",
              "sudo -H -u ubuntu pm2 save"
            ])}')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$COMMANDS_JSON" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || true

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '[Status,StandardOutputContent,StandardErrorContent]' \
            --output text

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'Status' \
            --output text)

          test "$STATUS" = "Success"
