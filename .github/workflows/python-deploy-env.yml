name: python-env

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version"
        required: true

concurrency:
  group: python-env
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Run
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CLIENT_ID: ${{ vars.DISCORD_CLIENT_ID }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
          APP_ORIGIN: https://${{ vars.DOMAIN }}
          API_ORIGIN: https://${{ vars.DOMAIN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RDS_INSTANCE_IDENTIFIER: ${{ vars.RDS_INSTANCE_ID }}
          RDS_REGION: ${{ vars.AWS_REGION }}
        run: |
          INSTANCE_IDS=$(printf '%s\n%s\n' \
            "${{ vars.CLOUDWATCH_INSTANCE_ID }}" \
            "${{ vars.PM2_INSTANCE_ID }}" | awk 'NF' | sort -u | xargs)

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No instance ids provided. Set vars.CLOUDWATCH_INSTANCE_ID and/or vars.PM2_INSTANCE_ID"
            exit 1
          fi

          ENV_CONTENT="$(printf '%s\n' \
            "DISCORD_BOT_TOKEN=$DISCORD_BOT_TOKEN" \
            "DISCORD_CLIENT_ID=$DISCORD_CLIENT_ID" \
            "DISCORD_CLIENT_SECRET=$DISCORD_CLIENT_SECRET" \
            "APP_ORIGIN=$APP_ORIGIN" \
            "API_ORIGIN=$API_ORIGIN" \
            "JWT_SECRET=$JWT_SECRET" \
            "RDS_INSTANCE_IDENTIFIER=$RDS_INSTANCE_IDENTIFIER" \
            "RDS_REGION=$RDS_REGION")"

          FAILED=0
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "[python-env] instance=$INSTANCE_ID"
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters "$(jq -n \
                  --arg appRoot "/var/www/trader-bot" \
                  --arg envContent "$ENV_CONTENT" \
                  '{commands: [
                    "set -e",
                    ("cd " + $appRoot),
                    "printf '%"'"'s'"'"' " + ($envContent | @sh) + " > python/.env",
                    "chown ubuntu:ubuntu python/.env",
                    "chmod 600 python/.env"
                  ]}')" \
              --query "Command.CommandId" \
              --output text)

            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" || FAILED=1

            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '[Status,StandardOutputContent,StandardErrorContent]' \
              --output text
          done

          test "$FAILED" -eq 0
