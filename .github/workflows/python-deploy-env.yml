name: python-deploy-env

on:
  push:
    branches: ["master"]
    paths:
      - "python/.env.example"
  workflow_dispatch:

concurrency:
  group: python-deploy-env
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.PYTHON_AWS_REGION }}

      - name: Deploy
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CLIENT_ID: ${{ vars.PYTHON_DISCORD_CLIENT_ID }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
          APP_ORIGIN: https://${{ vars.PYTHON_EC2_HOST }}
          API_ORIGIN: https://${{ vars.PYTHON_EC2_HOST }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RDS_INSTANCE_IDENTIFIER: ${{ vars.PYTHON_RDS_INSTANCE_IDENTIFIER }}
          RDS_REGION: ${{ vars.PYTHON_AWS_REGION }}
        run: |
          INSTANCE_IDS=$(printf '%s\n%s\n' \
            "${{ vars.PYTHON_BACKEND_INSTANCE_ID }}" \
            "${{ vars.PYTHON_BOT_INSTANCE_ID }}" | awk 'NF' | sort -u | xargs)

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No instance ids provided. Set vars.PYTHON_BACKEND_INSTANCE_ID and/or vars.PYTHON_BOT_INSTANCE_ID"
            exit 1
          fi

          ENV_CONTENT="$(printf '%s\n' \
            "DISCORD_BOT_TOKEN=$DISCORD_BOT_TOKEN" \
            "DISCORD_CLIENT_ID=$DISCORD_CLIENT_ID" \
            "DISCORD_CLIENT_SECRET=$DISCORD_CLIENT_SECRET" \
            "APP_ORIGIN=$APP_ORIGIN" \
            "API_ORIGIN=$API_ORIGIN" \
            "JWT_SECRET=$JWT_SECRET" \
            "RDS_INSTANCE_IDENTIFIER=$RDS_INSTANCE_IDENTIFIER" \
            "RDS_REGION=$RDS_REGION")"

          FAILED=0
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "[python-deploy-env] instance=$INSTANCE_ID"
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters "$(jq -n \
                  --arg appRoot "/var/www/trader-bot" \
                  --arg envContent "$ENV_CONTENT" \
                  '{commands: [
                    "set -e",
                    ("cd " + $appRoot),
                    "printf '%"'"'s'"'"' " + ($envContent | @sh) + " > python/.env",
                    "chown ubuntu:ubuntu python/.env",
                    "chmod 600 python/.env"
                  ]}')" \
              --query "Command.CommandId" \
              --output text)

            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" || FAILED=1

            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '[Status,StandardOutputContent,StandardErrorContent]' \
              --output text
          done

          test "$FAILED" -eq 0
