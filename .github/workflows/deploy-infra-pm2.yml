name: deploy-infra-pm2

on:
  workflow_call:
    inputs:
      phase:
        required: true
        type: string
      ref:
        required: true
        type: string
      ami:
        required: true
        type: string
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      phase:
        description: "Phase(beta, prod)"
        required: true
      ref:
        description: "Git ref (tag/branch/sha)"
        required: true
      ami:
        description: "AMI(backend, bot, golden)"
        required: true

concurrency:
  group: deploy-infra-pm2-${{ github.event_name == 'push' && github.ref_name || format('{0}-{1}-{2}', inputs.phase, inputs.ref, inputs.ami) }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Prepare
        id: prepare
        env:
          DEPLOY_MAP: ${{ vars.DEPLOY_MAP }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF##*/}"
            if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+b[0-9]*$ ]]; then
              PHASE="beta"
            elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              PHASE="prod"
            else
              echo "Invalid tag format: $TAG"
              exit 1
            fi
            REF="$TAG"
            AMI="golden"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PHASE="${{ inputs.phase }}"
            REF="${{ inputs.ref }}"
            AMI="${{ inputs.ami }}"
          else
            PHASE="${{ inputs.phase }}"
            REF="${{ inputs.ref }}"
            AMI="${{ inputs.ami }}"
          fi

          case "$AMI" in
            backend|bot|golden) ;;
            *)
              echo "Invalid ami: $AMI"
              exit 1
              ;;
          esac

          BACKEND_INSTANCE_ID=$(printf '%s' "$DEPLOY_MAP" | jq -er --arg phase "$PHASE" '.[$phase].backend')
          BOT_INSTANCE_ID=$(printf '%s' "$DEPLOY_MAP" | jq -er --arg phase "$PHASE" '.[$phase].bot')

          MISSING_DEPLOY_MAP_VALUES=""
          for KEY in backend bot; do
            VALUE=$(printf '%s' "$DEPLOY_MAP" | jq -er --arg phase "$PHASE" --arg key "$KEY" '.[$phase][$key]')
            if [ -z "$VALUE" ]; then
              if [ -z "$MISSING_DEPLOY_MAP_VALUES" ]; then
                MISSING_DEPLOY_MAP_VALUES=".${PHASE}.${KEY}"
              else
                MISSING_DEPLOY_MAP_VALUES="$MISSING_DEPLOY_MAP_VALUES,.${PHASE}.${KEY}"
              fi
            fi
          done

          if [ -n "$MISSING_DEPLOY_MAP_VALUES" ]; then
            echo "Missing DEPLOY_MAP value(s): $MISSING_DEPLOY_MAP_VALUES"
            exit 1
          fi

          if [ "$AMI" = "backend" ]; then
            INSTANCE_IDS=$(printf '%s\n' "$BACKEND_INSTANCE_ID" | awk 'NF' | sort -u | xargs)
          elif [ "$AMI" = "bot" ]; then
            INSTANCE_IDS=$(printf '%s\n' "$BOT_INSTANCE_ID" | awk 'NF' | sort -u | xargs)
          else
            INSTANCE_IDS=$(printf '%s\n%s\n' "$BACKEND_INSTANCE_ID" "$BOT_INSTANCE_ID" | awk 'NF' | sort -u | xargs)
          fi

          if [ -z "$INSTANCE_IDS" ]; then
            echo "Missing instance id(s): phase=$PHASE ami=$AMI"
            exit 1
          fi

          {
            echo "PHASE=$PHASE"
            echo "REF=$REF"
            echo "AMI=$AMI"
            echo "INSTANCE_IDS=$INSTANCE_IDS"
          } >> "$GITHUB_OUTPUT"

      - name: Run
        run: |
          set -euo pipefail
          PHASE="${{ steps.prepare.outputs.PHASE }}"
          REF="${{ steps.prepare.outputs.REF }}"
          AMI="${{ steps.prepare.outputs.AMI }}"
          INSTANCE_IDS="${{ steps.prepare.outputs.INSTANCE_IDS }}"

          COMMANDS_JSON=$(jq -n \
            --arg ref "$REF" \
            --arg repo "/home/ubuntu/trader-bot" \
            '{commands: (
              [
              "set -e",
              ("cd " + $repo),
              ("sudo -H -u ubuntu git -C " + $repo + " fetch --all --tags"),
              ("sudo -H -u ubuntu git -C " + $repo + " checkout --detach " + $ref),
              "systemctl enable pm2-ubuntu",
              "systemctl is-enabled --quiet pm2-ubuntu"
            ])}')

          FAILED=0
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "[deploy-infra-pm2] phase=$PHASE ami=$AMI instance=$INSTANCE_ID"
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters "$COMMANDS_JSON" \
              --query "Command.CommandId" \
              --output text)

            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" || FAILED=1

            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '[Status,StandardOutputContent,StandardErrorContent]' \
              --output text
          done

          test "$FAILED" -eq 0
