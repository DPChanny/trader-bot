name: deploy-infra-pm2

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      phase:
        description: "Phase(beta, prod)"
        required: true
      ref:
        description: "Git ref (tag/branch/sha)"
        required: true
      ami:
        description: "AMI(backend, bot, golden)"
        required: true

concurrency:
  group: deploy-infra-pm2-${{ github.event_name == 'workflow_dispatch' && inputs.phase || github.ref_name }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Prepare
        id: prepare
        env:
          DEPLOY_MAP: ${{ vars.DEPLOY_MAP }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF##*/}"
            if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+b[0-9]*$ ]]; then
              PHASE="beta"
            elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              PHASE="prod"
            else
              echo "Unrecognized tag format: $TAG"
              exit 1
            fi
            REF="$TAG"
            AMI="golden"
          else
            PHASE="${{ inputs.phase }}"
            REF="${{ inputs.ref }}"
            AMI="${{ inputs.ami }}"
          fi

          case "$AMI" in
            backend|bot|golden) ;;
            *)
              echo "Invalid ami: $AMI"
              exit 1
              ;;
          esac

          BACKEND_INSTANCE_ID=$(printf '%s' "$DEPLOY_MAP" | jq -er --arg phase "$PHASE" '.[$phase].backend')
          BOT_INSTANCE_ID=$(printf '%s' "$DEPLOY_MAP" | jq -er --arg phase "$PHASE" '.[$phase].bot')

          if [ -z "$BACKEND_INSTANCE_ID" ]; then
            echo "Missing required DEPLOY_MAP value: .${PHASE}.backend"
            exit 1
          fi
          if [ -z "$BOT_INSTANCE_ID" ]; then
            echo "Missing required DEPLOY_MAP value: .${PHASE}.bot"
            exit 1
          fi

          if [ "$AMI" = "backend" ]; then
            INSTANCE_IDS=$(printf '%s\n' "$BACKEND_INSTANCE_ID" | awk 'NF' | sort -u | xargs)
          elif [ "$AMI" = "bot" ]; then
            INSTANCE_IDS=$(printf '%s\n' "$BOT_INSTANCE_ID" | awk 'NF' | sort -u | xargs)
          else
            INSTANCE_IDS=$(printf '%s\n%s\n' "$BACKEND_INSTANCE_ID" "$BOT_INSTANCE_ID" | awk 'NF' | sort -u | xargs)
          fi

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No instance ids for phase=$PHASE ami=$AMI in vars.DEPLOY_MAP"
            exit 1
          fi

          {
            echo "PHASE=$PHASE"
            echo "REF=$REF"
            echo "AMI=$AMI"
            echo "INSTANCE_IDS=$INSTANCE_IDS"
          } >> "$GITHUB_OUTPUT"

      - name: Run
        run: |
          set -euo pipefail
          PHASE="${{ steps.prepare.outputs.PHASE }}"
          REF="${{ steps.prepare.outputs.REF }}"
          AMI="${{ steps.prepare.outputs.AMI }}"
          INSTANCE_IDS="${{ steps.prepare.outputs.INSTANCE_IDS }}"

          COMMANDS_JSON=$(jq -n \
            --arg ref "$REF" \
            --arg ami "$AMI" \
            --arg repo "/var/www/trader-bot" \
            '{commands: (
              ($repo + "/infra/pm2/ecosystem.config.mjs") as $source_ecosystem |
              [
              "set -e",
              ("cd " + $repo),
              ("sudo -u ubuntu git -C " + $repo + " fetch --all --tags"),
              ("sudo -u ubuntu git -C " + $repo + " checkout --detach " + $ref),
              (if $ami == "backend" then "sudo -H -u ubuntu pm2 startOrReload " + $source_ecosystem + " --only trader-bot-pm2-backend"
               elif $ami == "bot" then "sudo -H -u ubuntu pm2 startOrReload " + $source_ecosystem + " --only trader-bot-pm2-bot"
               else "sudo -H -u ubuntu pm2 startOrReload " + $source_ecosystem
               end),
              "sudo -H -u ubuntu pm2 save",
              "sudo systemctl enable pm2-ubuntu"
            ])}')

          FAILED=0
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "[deploy-infra-pm2] phase=$PHASE ami=$AMI instance=$INSTANCE_ID"
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters "$COMMANDS_JSON" \
              --query "Command.CommandId" \
              --output text)

            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" || FAILED=1

            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '[Status,StandardOutputContent,StandardErrorContent]' \
              --output text
          done

          test "$FAILED" -eq 0
