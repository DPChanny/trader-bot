name: deploy-infra-pm2

on:
  push:
    branches: ["master"]
    paths:
      - "infra/pm2/**"
  workflow_dispatch:
    inputs:
      phase:
        description: "Phase(beta, prod)"
        required: true
        default: "prod"
      ref:
        description: "Git ref (tag/branch/sha)"
        required: true
      target:
        description: "Target(backend, bot, all)"
        required: false
        default: "all"

concurrency:
  group: deploy-infra-pm2-${{ inputs.phase || 'prod' }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Prepare
        id: prepare
        env:
          DEPLOY_MAP: ${{ vars.DEPLOY_MAP }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PHASE="${{ inputs.phase }}"
            REF="${{ inputs.ref }}"
            TARGET="${{ inputs.target || 'all' }}"
          else
            PHASE="prod"
            REF="${{ github.sha }}"
            TARGET="all"
          fi

          case "$PHASE" in
            beta|prod) ;;
            *)
              echo "Invalid phase: $PHASE"
              exit 1
              ;;
          esac

          case "$TARGET" in
            backend|bot|all) ;;
            *)
              echo "Invalid target: $TARGET"
              exit 1
              ;;
          esac

          if [ -z "${DEPLOY_MAP}" ]; then
            echo "Missing vars.DEPLOY_MAP"
            exit 1
          fi

          if ! printf '%s' "$REF" | grep -Eq '^[A-Za-z0-9._/-]+$'; then
            echo "Invalid ref format: $REF"
            exit 1
          fi
          if printf '%s' "$REF" | grep -Eq '^-'; then
            echo "Invalid ref format (cannot start with '-') : $REF"
            exit 1
          fi

          if [ "$TARGET" = "backend" ]; then
            INSTANCE_IDS=$(printf '%s' "$DEPLOY_MAP" | jq -r --arg phase "$PHASE" '
              .[$phase].backend // empty |
              if type == "array" then .[] else . end
            ' | awk 'NF' | sort -u | xargs)
          elif [ "$TARGET" = "bot" ]; then
            INSTANCE_IDS=$(printf '%s' "$DEPLOY_MAP" | jq -r --arg phase "$PHASE" '
              .[$phase].bot // empty |
              if type == "array" then .[] else . end
            ' | awk 'NF' | sort -u | xargs)
          else
            INSTANCE_IDS=$(printf '%s' "$DEPLOY_MAP" | jq -r --arg phase "$PHASE" '
              [
                (.[$phase].backend // empty),
                (.[$phase].bot // empty)
              ]
              | map(if type == "array" then .[] else . end)
              | .[]
            ' | awk 'NF' | sort -u | xargs)
          fi

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No instance ids for phase=$PHASE target=$TARGET in vars.DEPLOY_MAP"
            exit 1
          fi

          {
            echo "PHASE=$PHASE"
            echo "REF=$REF"
            echo "TARGET=$TARGET"
            echo "INSTANCE_IDS=$INSTANCE_IDS"
          } >> "$GITHUB_OUTPUT"

      - name: Run
        run: |
          set -euo pipefail
          PHASE="${{ steps.prepare.outputs.PHASE }}"
          REF="${{ steps.prepare.outputs.REF }}"
          TARGET="${{ steps.prepare.outputs.TARGET }}"
          INSTANCE_IDS="${{ steps.prepare.outputs.INSTANCE_IDS }}"

          COMMANDS_JSON=$(jq -n \
            --arg ref "$REF" \
            --arg target "$TARGET" \
            --arg repo "/var/www/trader-bot" \
            '{commands: [
              "set -e",
              ("cd " + $repo),
              "sudo -iu ubuntu git fetch --all --tags",
              ("sudo -iu ubuntu git checkout --detach " + $ref),
              "sudo install -d /var/www/trader-bot/python/aws",
              "sudo ln -sfn /var/www/trader-bot/infra/pm2/ecosystem.config.mjs /var/www/trader-bot/python/aws/ecosystem.config.mjs",
              "cat <<'"'"'EOF'"'"' > /tmp/deploy-infra-pm2.sh",
              "set -e",
              "pm2 startup systemd -u ubuntu --hp /home/ubuntu || true",
              "if [ \"" + $target + "\" = \"backend\" ]; then",
              "  pm2 startOrReload /var/www/trader-bot/infra/pm2/ecosystem.config.mjs --only trader-bot-pm2-backend",
              "elif [ \"" + $target + "\" = \"bot\" ]; then",
              "  pm2 startOrReload /var/www/trader-bot/infra/pm2/ecosystem.config.mjs --only trader-bot-pm2-bot",
              "else",
              "  pm2 startOrReload /var/www/trader-bot/infra/pm2/ecosystem.config.mjs",
              "fi",
              "pm2 save",
              "EOF",
              "chmod 700 /tmp/deploy-infra-pm2.sh",
              "sudo -iu ubuntu bash /tmp/deploy-infra-pm2.sh",
              "rm -f /tmp/deploy-infra-pm2.sh",
              "sudo systemctl enable pm2-ubuntu || true",
              "sudo systemctl restart pm2-ubuntu || true"
            ]}')

          FAILED=0
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "[deploy-infra-pm2] phase=$PHASE target=$TARGET instance=$INSTANCE_ID"
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters "$COMMANDS_JSON" \
              --query "Command.CommandId" \
              --output text)

            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" || FAILED=1

            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '[Status,StandardOutputContent,StandardErrorContent]' \
              --output text
          done

          test "$FAILED" -eq 0
