name: deploy-infra-pm2

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      phase:
        description: "Phase(beta, prod)"
        required: true
      ref:
        description: "Git ref (tag/branch/sha)"
        required: true
      target:
        description: "Target(backend, bot, all)"
        required: true

concurrency:
  group: deploy-infra-pm2-${{ github.event_name == 'workflow_dispatch' && inputs.phase || github.ref_name }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Prepare
        id: prepare
        env:
          DEPLOY_MAP: ${{ vars.DEPLOY_MAP }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF##*/}"
            if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+b[0-9]*$ ]]; then
              PHASE="beta"
            elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              PHASE="prod"
            else
              echo "Unrecognized tag format: $TAG"
              exit 1
            fi
            REF="$TAG"
            TARGET="all"
          else
            PHASE="${{ inputs.phase }}"
            REF="${{ inputs.ref }}"
            TARGET="${{ inputs.target }}"
          fi

          case "$TARGET" in
            backend|bot|all) ;;
            *)
              echo "Invalid target: $TARGET"
              exit 1
              ;;
          esac

          BACKEND_INSTANCE_ID=$(printf '%s' "$DEPLOY_MAP" | jq -er --arg phase "$PHASE" '.[$phase].backend')
          BOT_INSTANCE_ID=$(printf '%s' "$DEPLOY_MAP" | jq -er --arg phase "$PHASE" '.[$phase].bot')

          if [ -z "$BACKEND_INSTANCE_ID" ]; then
            echo "Missing required DEPLOY_MAP value: .${PHASE}.backend"
            exit 1
          fi
          if [ -z "$BOT_INSTANCE_ID" ]; then
            echo "Missing required DEPLOY_MAP value: .${PHASE}.bot"
            exit 1
          fi

          if [ "$TARGET" = "backend" ]; then
            INSTANCE_IDS=$(printf '%s\n' "$BACKEND_INSTANCE_ID" | awk 'NF' | sort -u | xargs)
          elif [ "$TARGET" = "bot" ]; then
            INSTANCE_IDS=$(printf '%s\n' "$BOT_INSTANCE_ID" | awk 'NF' | sort -u | xargs)
          else
            INSTANCE_IDS=$(printf '%s\n%s\n' "$BACKEND_INSTANCE_ID" "$BOT_INSTANCE_ID" | awk 'NF' | sort -u | xargs)
          fi

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No instance ids for phase=$PHASE target=$TARGET in vars.DEPLOY_MAP"
            exit 1
          fi

          {
            echo "PHASE=$PHASE"
            echo "REF=$REF"
            echo "TARGET=$TARGET"
            echo "INSTANCE_IDS=$INSTANCE_IDS"
          } >> "$GITHUB_OUTPUT"

      - name: Run
        run: |
          set -euo pipefail
          PHASE="${{ steps.prepare.outputs.PHASE }}"
          REF="${{ steps.prepare.outputs.REF }}"
          TARGET="${{ steps.prepare.outputs.TARGET }}"
          INSTANCE_IDS="${{ steps.prepare.outputs.INSTANCE_IDS }}"

          COMMANDS_JSON=$(jq -n \
            --arg ref "$REF" \
            --arg target "$TARGET" \
            --arg repo "/var/www/trader-bot" \
            '{commands: [
              "set -e",
              ("cd " + $repo),
              "sudo -iu ubuntu git fetch --all --tags",
              ("sudo -iu ubuntu git checkout --detach " + $ref),
              "sudo install -d /var/www/trader-bot/python/aws",
              "sudo ln -sfn /var/www/trader-bot/infra/pm2/ecosystem.config.mjs /var/www/trader-bot/python/aws/ecosystem.config.mjs",
              "cat <<'"'"'EOF'"'"' > /tmp/deploy-infra-pm2.sh",
              "set -e",
              "if [ \"" + $target + "\" = \"backend\" ]; then",
              "  pm2 startOrReload /var/www/trader-bot/infra/pm2/ecosystem.config.mjs --only trader-bot-pm2-backend",
              "elif [ \"" + $target + "\" = \"bot\" ]; then",
              "  pm2 startOrReload /var/www/trader-bot/infra/pm2/ecosystem.config.mjs --only trader-bot-pm2-bot",
              "else",
              "  pm2 startOrReload /var/www/trader-bot/infra/pm2/ecosystem.config.mjs",
              "fi",
              "pm2 save",
              "EOF",
              "chmod 700 /tmp/deploy-infra-pm2.sh",
              "sudo -iu ubuntu bash /tmp/deploy-infra-pm2.sh",
              "rm -f /tmp/deploy-infra-pm2.sh",
              "sudo systemctl enable --now pm2-ubuntu",
              "sudo systemctl is-active --quiet pm2-ubuntu"
            ]}')

          FAILED=0
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "[deploy-infra-pm2] phase=$PHASE target=$TARGET instance=$INSTANCE_ID"
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters "$COMMANDS_JSON" \
              --query "Command.CommandId" \
              --output text)

            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" || FAILED=1

            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '[Status,StandardOutputContent,StandardErrorContent]' \
              --output text
          done

          test "$FAILED" -eq 0
