name: Deploy Bot

on:
  push:
    tags: ["v*"]
    paths:
      - "python/bot/**"
      - "python/shared/**"
      - "python/pyproject.toml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: CI
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CLIENT_ID: ${{ vars.DISCORD_CLIENT_ID }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
          APP_ORIGIN: https://${{ vars.EC2_HOST }}
          API_ORIGIN: https://${{ vars.EC2_HOST }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RDS_INSTANCE_IDENTIFIER: ${{ vars.RDS_INSTANCE_IDENTIFIER }}
          RDS_REGION: ${{ vars.AWS_REGION }}
        run: |
          aws ssm put-parameter \
            --name "/trader-bot/prod/python/env" \
            --value "$(printf '%s\n' \
              "DISCORD_BOT_TOKEN=$DISCORD_BOT_TOKEN" \
              "DISCORD_CLIENT_ID=$DISCORD_CLIENT_ID" \
              "DISCORD_CLIENT_SECRET=$DISCORD_CLIENT_SECRET" \
              "APP_ORIGIN=$APP_ORIGIN" \
              "API_ORIGIN=$API_ORIGIN" \
              "JWT_SECRET=$JWT_SECRET" \
              "RDS_INSTANCE_IDENTIFIER=$RDS_INSTANCE_IDENTIFIER" \
              "RDS_REGION=$RDS_REGION")" \
            --type SecureString \
            --overwrite

      - name: CD
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
          INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$(jq -rn --arg tag "$TAG" '{commands: [
              "set -e",
              "cd /var/www/trader-bot",
              ("git fetch --tags origin && git checkout --detach " + $tag),
              "aws ssm get-parameter --name /trader-bot/prod/python/env --with-decryption --query Parameter.Value --output text > python/.env",
              "cd python && uv sync --frozen",
              "pm2 startOrReload ecosystem.config.mjs --only trader-bot-prod-pm2-bot && pm2 save"
            ]}')" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || true

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '[Status,StandardOutputContent,StandardErrorContent]' \
            --output text
