name: deploy-python-backend

on:
  workflow_call:
    inputs:
      phase:
        required: true
        type: string
      ref:
        required: true
        type: string

concurrency:
  group: deploy-python-backend-${{ inputs.phase }}-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Prepare
        id: prepare
        env:
          DEPLOY_MAP: ${{ vars.DEPLOY_MAP }}
        run: |
          set -euo pipefail

          PHASE="${{ inputs.phase }}"
          REF="${{ inputs.ref }}"

          case "$PHASE" in
            beta|prod) ;;
            *)
              echo "Invalid phase: $PHASE"
              exit 1
              ;;
          esac

          BACKEND_INSTANCE_ID=$(printf '%s' "$DEPLOY_MAP" | jq -er --arg phase "$PHASE" '.[$phase].backend')

          if [ -z "$BACKEND_INSTANCE_ID" ]; then
            echo "Missing required DEPLOY_MAP value: .${PHASE}.backend"
            exit 1
          fi

          {
            echo "PHASE=$PHASE"
            echo "REF=$REF"
            echo "BACKEND_INSTANCE_ID=$BACKEND_INSTANCE_ID"
          } >> "$GITHUB_OUTPUT"

      - name: Run
        run: |
          set -euo pipefail
          PHASE="${{ steps.prepare.outputs.PHASE }}"
          REF="${{ steps.prepare.outputs.REF }}"
          BACKEND_INSTANCE_ID="${{ steps.prepare.outputs.BACKEND_INSTANCE_ID }}"

          COMMANDS_JSON=$(jq -n \
            --arg ref "$REF" \
            --arg repo "/var/www/trader-bot" \
            '{commands: (
              ($repo + "/python") as $python_dir |
              ($repo + "/infra/pm2/ecosystem.config.mjs") as $source_ecosystem |
              [
              "set -e",
              ("cd " + $repo),
              ("sudo -u ubuntu git -C " + $repo + " fetch --all --tags"),
              ("sudo -u ubuntu git -C " + $repo + " checkout --detach " + $ref),
              ("sudo -u ubuntu bash -lc 'uv sync --frozen --project " + $python_dir + "'"),
              ("sudo -H -u ubuntu pm2 startOrReload " + $source_ecosystem + " --only trader-bot-pm2-backend")
            ])}')

          echo "[deploy-python-backend] phase=$PHASE instance=$BACKEND_INSTANCE_ID"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$BACKEND_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$COMMANDS_JSON" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$BACKEND_INSTANCE_ID" || true

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$BACKEND_INSTANCE_ID" \
            --query '[Status,StandardOutputContent,StandardErrorContent]' \
            --output text

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$BACKEND_INSTANCE_ID" \
            --query 'Status' \
            --output text)

          test "$STATUS" = "Success"
