name: deploy-python-backend

on:
  workflow_run:
    workflows: ["deploy-python"]
    types: [completed]
  workflow_dispatch:
    inputs:
      phase:
        description: "Phase(beta, prod)"
        required: true
      ref:
        description: "Git ref (tag/branch/sha)"
        required: true

concurrency:
  group: deploy-python-backend-${{ github.event_name == 'workflow_dispatch' && inputs.phase || github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  run:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    steps:
      - name: Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Prepare
        id: prepare
        env:
          DEPLOY_MAP: ${{ vars.DEPLOY_MAP }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PHASE="${{ inputs.phase }}"
            REF="${{ inputs.ref }}"
          else
            REF="${{ github.event.workflow_run.head_sha }}"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            TAG=$(git ls-remote --tags "$REPO_URL" | awk -v sha="$REF" '$1==sha {print $2}' | sed 's#refs/tags/##' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+(b[0-9]*)?$' | head -n1)

            if [ -z "$TAG" ]; then
              echo "Cannot resolve tag for workflow_run sha: $REF"
              exit 1
            fi

            if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+b[0-9]*$ ]]; then
              PHASE="beta"
            elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              PHASE="prod"
            else
              echo "Unrecognized tag format: $TAG"
              exit 1
            fi
          fi

          BACKEND_INSTANCE_ID=$(printf '%s' "$DEPLOY_MAP" | jq -er --arg phase "$PHASE" '.[$phase].backend')

          if [ -z "$BACKEND_INSTANCE_ID" ]; then
            echo "Missing required DEPLOY_MAP value: .${PHASE}.backend"
            exit 1
          fi

          {
            echo "PHASE=$PHASE"
            echo "REF=$REF"
            echo "BACKEND_INSTANCE_ID=$BACKEND_INSTANCE_ID"
          } >> "$GITHUB_OUTPUT"

      - name: Run
        run: |
          set -euo pipefail
          PHASE="${{ steps.prepare.outputs.PHASE }}"
          REF="${{ steps.prepare.outputs.REF }}"
          BACKEND_INSTANCE_ID="${{ steps.prepare.outputs.BACKEND_INSTANCE_ID }}"

          COMMANDS_JSON=$(jq -n \
            --arg ref "$REF" \
            --arg phase "$PHASE" \
            --arg repo "/var/www/trader-bot" \
            '{commands: (
              ($repo + "/python") as $python_dir |
              ($repo + "/infra/pm2/ecosystem.config.mjs") as $source_ecosystem |
              ($repo + "/infra/cloudwatch/amazon-cloudwatch-agent.d") as $source_dir |
              ($source_dir + "/agent.json") as $source_agent_json |
              ($source_dir + "/trader-bot-" + $phase + "-lg-backend.json") as $source_backend_json |
              [
              "set -e",
              ("cd " + $repo),
              ("sudo -u ubuntu git -C " + $repo + " fetch --all --tags"),
              ("sudo -u ubuntu git -C " + $repo + " checkout --detach " + $ref),
              ("sudo -u ubuntu bash -lc 'uv sync --frozen --project " + $python_dir + "'"),
              ("sudo -H -u ubuntu pm2 startOrReload " + $source_ecosystem + " --only trader-bot-pm2-backend"),
              "sudo -H -u ubuntu pm2 save",
              "sudo systemctl enable pm2-ubuntu",
              ("sudo amazon-cloudwatch-agent-ctl -a fetch-config -m ec2 -c file:" + $source_agent_json + " -s"),
              ("sudo amazon-cloudwatch-agent-ctl -a append-config -m ec2 -c file:" + $source_backend_json),
              "sudo -H -u ubuntu pm2 ping",
              "sudo systemctl is-active --quiet amazon-cloudwatch-agent"
            ])}')

          echo "[deploy-python-backend] phase=$PHASE instance=$BACKEND_INSTANCE_ID"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$BACKEND_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$COMMANDS_JSON" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$BACKEND_INSTANCE_ID" || true

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$BACKEND_INSTANCE_ID" \
            --query '[Status,StandardOutputContent,StandardErrorContent]' \
            --output text

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$BACKEND_INSTANCE_ID" \
            --query 'Status' \
            --output text)

          test "$STATUS" = "Success"
