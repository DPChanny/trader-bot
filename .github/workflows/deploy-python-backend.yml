name: deploy-python-backend

on:
  workflow_dispatch:
    inputs:
      phase:
        description: "Phase(beta, prod)"
        required: true
      ref:
        description: "Git ref (tag/branch/sha)"
        required: true

concurrency:
  group: deploy-python-backend-${{ inputs.phase }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Prepare
        id: prepare
        env:
          DEPLOY_MAP: ${{ vars.DEPLOY_MAP }}
          BETA_BACKEND_INSTANCE_ID: ${{ vars.BETA_BACKEND_INSTANCE_ID }}
          PROD_BACKEND_INSTANCE_ID: ${{ vars.PROD_BACKEND_INSTANCE_ID }}
        run: |
          set -euo pipefail

          PHASE="${{ inputs.phase }}"
          REF="${{ inputs.ref }}"

          BACKEND_INSTANCE_KEY=$(printf '%s' "$DEPLOY_MAP" | jq -er --arg phase "$PHASE" '.[$phase].backend')
          BACKEND_INSTANCE_ID="${!BACKEND_INSTANCE_KEY:-}"

          if [ -z "$BACKEND_INSTANCE_ID" ]; then
            echo "Missing required variable: $BACKEND_INSTANCE_KEY"
            exit 1
          fi

          {
            echo "PHASE=$PHASE"
            echo "REF=$REF"
            echo "BACKEND_INSTANCE_ID=$BACKEND_INSTANCE_ID"
          } >> "$GITHUB_OUTPUT"

      - name: Run
        run: |
          set -euo pipefail
          PHASE="${{ steps.prepare.outputs.PHASE }}"
          REF="${{ steps.prepare.outputs.REF }}"
          BACKEND_INSTANCE_ID="${{ steps.prepare.outputs.BACKEND_INSTANCE_ID }}"

          COMMANDS_JSON=$(jq -n \
            --arg ref "$REF" \
            --arg phase "$PHASE" \
            --arg repo "/var/www/trader-bot" \
            '{commands: [
              "set -e",
              ("cd " + $repo),
              "sudo -iu ubuntu git fetch --all --tags",
              ("sudo -iu ubuntu git checkout --detach " + $ref),
              "cat <<'"'"'EOF'"'"' > /tmp/deploy-python-backend.sh",
              "set -e",
              "cd /var/www/trader-bot/python",
              "uv sync --frozen",
              "pm2 startup systemd -u ubuntu --hp /home/ubuntu || true",
              "pm2 startOrReload /var/www/trader-bot/infra/pm2/ecosystem.config.mjs --only trader-bot-pm2-backend",
              "pm2 save",
              "sudo install -d /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d",
              "sudo install -m 644 /var/www/trader-bot/infra/cloudwatch/amazon-cloudwatch-agent.d/agent.json /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/agent.json",
              ("sudo install -m 644 /var/www/trader-bot/infra/cloudwatch/amazon-cloudwatch-agent.d/trader-bot-" + $phase + "-lg-backend.json /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/trader-bot-" + $phase + "-lg-backend.json"),
              "sudo /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a fetch-config -m ec2 -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/agent.json -s",
              ("sudo /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a append-config -m ec2 -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/trader-bot-" + $phase + "-lg-backend.json"),
              "sudo systemctl enable pm2-ubuntu || true",
              "sudo systemctl restart pm2-ubuntu || true",
              "EOF",
              "chmod 700 /tmp/deploy-python-backend.sh",
              "sudo -iu ubuntu bash /tmp/deploy-python-backend.sh",
              "rm -f /tmp/deploy-python-backend.sh"
            ]}')

          echo "[deploy-python-backend] phase=$PHASE instance=$BACKEND_INSTANCE_ID"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$BACKEND_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$COMMANDS_JSON" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$BACKEND_INSTANCE_ID"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$BACKEND_INSTANCE_ID" \
            --query '[Status,StandardOutputContent,StandardErrorContent]' \
            --output text
