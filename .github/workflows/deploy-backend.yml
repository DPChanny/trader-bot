name: Deploy Backend

on:
  push:
    tags: ["v*"]
    paths:
      - "python/backend/**"
      - "python/shared/**"
      - "python/pyproject.toml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: CI
        id: ci
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CLIENT_ID: ${{ vars.DISCORD_CLIENT_ID }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
          APP_ORIGIN: https://${{ vars.EC2_HOST }}
          API_ORIGIN: https://${{ vars.EC2_HOST }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RDS_INSTANCE_IDENTIFIER: ${{ vars.RDS_INSTANCE_IDENTIFIER }}
          RDS_REGION: ${{ vars.AWS_REGION }}
        run: |
          ENV_B64=$(printf '%s\n' \
            "DISCORD_BOT_TOKEN=$DISCORD_BOT_TOKEN" \
            "DISCORD_CLIENT_ID=$DISCORD_CLIENT_ID" \
            "DISCORD_CLIENT_SECRET=$DISCORD_CLIENT_SECRET" \
            "APP_ORIGIN=$APP_ORIGIN" \
            "API_ORIGIN=$API_ORIGIN" \
            "JWT_SECRET=$JWT_SECRET" \
            "RDS_INSTANCE_IDENTIFIER=$RDS_INSTANCE_IDENTIFIER" \
            "RDS_REGION=$RDS_REGION" \
            | base64 -w 0)
          echo "env_b64=$ENV_B64" >> "$GITHUB_OUTPUT"

      - name: CD
        env:
          TAG: ${{ github.ref_name }}
          ENV_B64: ${{ steps.ci.outputs.env_b64 }}
          INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$(jq -rn --arg tag "$TAG" --arg env "$ENV_B64" '{commands: [
              "set -e",
              "cd /var/www/trader-bot",
              ("git fetch --tags origin && git checkout --detach " + $tag),
              ("echo " + $env + " | base64 -d > python/.env"),
              "cd python && uv sync --frozen",
              "pm2 reload trader-bot-backend || pm2 start '\''uv run python -m uvicorn backend.main:app --host localhost --port 8000'\'' --name trader-bot-backend && pm2 save"
            ]}')" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"
