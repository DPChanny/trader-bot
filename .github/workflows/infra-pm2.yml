name: infra-pm2

on:
  push:
    branches: ["master"]
    paths:
      - "infra/pm2/**"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag/branch/sha)"
        required: true
      target:
        description: "Target(backend, bot, all)"
        required: false
        default: "all"

concurrency:
  group: infra
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Prepare
        id: prepare
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF="${{ inputs.ref }}"
            TARGET="${{ inputs.target || 'all' }}"
          else
            REF="${{ github.sha }}"
            TARGET="all"
          fi

          if [ "$TARGET" = "bot" ]; then
            INSTANCE_IDS=$(printf '%s\n%s\n' \
              "${{ vars.CLOUDWATCH_INSTANCE_ID }}" \
              "${{ vars.PM2_INSTANCE_ID }}" | awk 'NF' | sort -u | xargs)
          else
            INSTANCE_IDS=$(printf '%s\n%s\n%s\n' \
              "${{ vars.NGINX_INSTANCE_ID }}" \
              "${{ vars.CLOUDWATCH_INSTANCE_ID }}" \
              "${{ vars.PM2_INSTANCE_ID }}" | awk 'NF' | sort -u | xargs)
          fi

          {
            echo "TARGET=$TARGET"
            echo "REF=$REF"
            echo "INSTANCE_IDS=$INSTANCE_IDS"
          } >> "$GITHUB_OUTPUT"

      - name: Validate
        run: |
          TARGET="${{ steps.prepare.outputs.TARGET }}"
          REF="${{ steps.prepare.outputs.REF }}"
          INSTANCE_IDS="${{ steps.prepare.outputs.INSTANCE_IDS }}"

          case "$TARGET" in
            backend|bot|all)
              ;;
            *)
              echo "Invalid target: $TARGET (expected backend, bot, all)"
              exit 1
              ;;
          esac

          if [ -z "$REF" ]; then
            echo "Missing ref from prepare"
            exit 1
          fi

          if ! printf '%s' "$REF" | grep -Eq '^[A-Za-z0-9._/-]+$'; then
            echo "Invalid ref format: $REF"
            exit 1
          fi
          if printf '%s' "$REF" | grep -Eq '^-'; then
            echo "Invalid ref format (cannot start with '-'): $REF"
            exit 1
          fi

          if [ -z "$INSTANCE_IDS" ]; then
            if [ "$TARGET" = "bot" ]; then
              echo "No instance ids provided. Set vars.CLOUDWATCH_INSTANCE_ID and/or vars.PM2_INSTANCE_ID"
            else
              echo "No instance ids provided. Set vars.NGINX_INSTANCE_ID and/or vars.CLOUDWATCH_INSTANCE_ID and/or vars.PM2_INSTANCE_ID"
            fi
            exit 1
          fi

      - name: Run
        run: |
          TARGET="${{ steps.prepare.outputs.TARGET }}"
          REF="${{ steps.prepare.outputs.REF }}"
          INSTANCE_IDS="${{ steps.prepare.outputs.INSTANCE_IDS }}"

          COMMANDS_JSON=$(jq -n \
            --arg ref "$REF" \
            --arg repo "/var/www/trader-bot" \
            --arg target "$TARGET" \
            '{commands: [
              "set -e",
              ("cd " + $repo),
              ("git fetch --all --tags && git checkout --detach " + $ref),
              "install -d /var/www/trader-bot/python/aws",
              "ln -sfn /var/www/trader-bot/infra/pm2/ecosystem.config.mjs /var/www/trader-bot/python/aws/ecosystem.config.mjs",
              "cat <<'\''EOF'\'' > /tmp/infra-pm2.sh",
              "set -e",
              "pm2 startup systemd -u ubuntu --hp /home/ubuntu || true",
              "if [ \"" + $target + "\" = \"backend\" ]; then pm2 startOrReload /var/www/trader-bot/infra/pm2/ecosystem.config.mjs --only trader-bot-prod-pm2-backend; elif [ \"" + $target + "\" = \"bot\" ]; then pm2 startOrReload /var/www/trader-bot/infra/pm2/ecosystem.config.mjs --only trader-bot-prod-pm2-bot; else pm2 startOrReload /var/www/trader-bot/infra/pm2/ecosystem.config.mjs; fi",
              "pm2 save",
              "EOF",
              "chmod 700 /tmp/infra-pm2.sh",
              "sudo -iu ubuntu bash /tmp/infra-pm2.sh",
              "rm -f /tmp/infra-pm2.sh",
              "systemctl enable pm2-ubuntu || true",
              "systemctl restart pm2-ubuntu || true"
            ]}')

          FAILED=0
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "[infra-pm2] instance=$INSTANCE_ID target=$TARGET"
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters "$COMMANDS_JSON" \
              --query "Command.CommandId" \
              --output text)

            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" || FAILED=1

            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '[Status,StandardOutputContent,StandardErrorContent]' \
              --output text
          done

          test "$FAILED" -eq 0
