name: python-deploy-bot

on:
  workflow_run:
    workflows: ["python-deploy-env"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy"
        required: true

concurrency:
  group: python-deploy-bot
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            REF="${{ github.event.workflow_run.head_sha }}"
          else
            REF="${{ inputs.tag || github.ref_name }}"
          fi
          INSTANCE_IDS=$(printf '%s\n%s\n%s\n' \
            "${{ vars.NGINX_INSTANCE_ID }}" \
            "${{ vars.CLOUDWATCH_INSTANCE_ID }}" \
            "${{ vars.PM2_INSTANCE_ID }}" | awk 'NF' | sort -u | xargs)

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No instance ids provided. Set vars.NGINX_INSTANCE_ID and/or vars.CLOUDWATCH_INSTANCE_ID and/or vars.PM2_INSTANCE_ID"
            exit 1
          fi

          FAILED=0
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "[python-deploy-bot] instance=$INSTANCE_ID"
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters "$(jq -n \
                  --arg ref "$REF" \
                  --arg appRoot "/var/www/trader-bot" \
                  '{commands: [
                    "set -e",
                    ("cd " + $appRoot),
                    ("git fetch --tags origin && git checkout --detach " + $ref),
                    "cat <<'\''EOF'\'' > /tmp/trader-bot-deploy-bot.sh",
                    "set -e",
                    "cd /var/www/trader-bot/python",
                    "uv sync --frozen",
                    "pm2 startOrReload /var/www/trader-bot/infra/pm2/ecosystem.config.mjs --only trader-bot-prod-pm2-bot",
                    "pm2 save",
                    "EOF",
                    "chmod 700 /tmp/trader-bot-deploy-bot.sh",
                    "sudo -iu ubuntu bash /tmp/trader-bot-deploy-bot.sh",
                    "rm -f /tmp/trader-bot-deploy-bot.sh"
                  ]}')" \
              --query "Command.CommandId" \
              --output text)

            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" || FAILED=1

            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '[Status,StandardOutputContent,StandardErrorContent]' \
              --output text
          done

          test "$FAILED" -eq 0
