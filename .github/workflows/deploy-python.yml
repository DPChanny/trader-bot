name: deploy-python

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      phase:
        description: "Phase(beta, prod)"
        required: true
      ref:
        description: "Git ref (tag/branch/sha)"
        required: true

concurrency:
  group: deploy-python-${{ github.event_name == 'push' && github.ref_name || format('{0}-{1}', inputs.phase, inputs.ref) }}
  cancel-in-progress: false

jobs:
  run:
    outputs:
      phase: ${{ steps.prepare.outputs.PHASE }}
      ref: ${{ steps.prepare.outputs.REF }}
    runs-on: ubuntu-latest
    steps:
      - name: Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Prepare
        id: prepare
        env:
          DEPLOY_MAP: ${{ vars.DEPLOY_MAP }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CLIENT_ID: ${{ vars.DISCORD_CLIENT_ID }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RDS_REGION: ${{ vars.AWS_REGION }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF##*/}"
            if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+b[0-9]*$ ]]; then
              PHASE="beta"
            elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              PHASE="prod"
            else
              echo "Invalid tag format: $TAG"
              exit 1
            fi
            REF="$TAG"
          else
            PHASE="${{ inputs.phase }}"
            REF="${{ inputs.ref }}"
          fi

          BACKEND_INSTANCE_ID=$(printf '%s' "$DEPLOY_MAP" | jq -er --arg phase "$PHASE" '.[$phase].backend')
          BOT_INSTANCE_ID=$(printf '%s' "$DEPLOY_MAP" | jq -er --arg phase "$PHASE" '.[$phase].bot')
          DOMAIN=$(printf '%s' "$DEPLOY_MAP" | jq -er --arg phase "$PHASE" '.[$phase].domain')
          RDS_INSTANCE_ID=$(printf '%s' "$DEPLOY_MAP" | jq -er --arg phase "$PHASE" '.[$phase].rds')

          MISSING_DEPLOY_MAP_VALUES=""
          for KEY in backend bot domain rds; do
            VALUE=$(printf '%s' "$DEPLOY_MAP" | jq -er --arg phase "$PHASE" --arg key "$KEY" '.[$phase][$key]')
            if [ -z "$VALUE" ]; then
              if [ -z "$MISSING_DEPLOY_MAP_VALUES" ]; then
                MISSING_DEPLOY_MAP_VALUES=".${PHASE}.${KEY}"
              else
                MISSING_DEPLOY_MAP_VALUES="$MISSING_DEPLOY_MAP_VALUES,.${PHASE}.${KEY}"
              fi
            fi
          done

          if [ -n "$MISSING_DEPLOY_MAP_VALUES" ]; then
            echo "Missing DEPLOY_MAP value(s): $MISSING_DEPLOY_MAP_VALUES"
            exit 1
          fi

          INSTANCE_IDS=$(printf '%s\n%s\n' "$BACKEND_INSTANCE_ID" "$BOT_INSTANCE_ID" | awk 'NF' | sort -u | xargs)

          APP_ORIGIN="https://$DOMAIN"
          API_ORIGIN="https://$DOMAIN"

          MISSING_VARS=""
          for VAR in DISCORD_BOT_TOKEN DISCORD_CLIENT_ID DISCORD_CLIENT_SECRET JWT_SECRET DOMAIN RDS_INSTANCE_ID RDS_REGION; do
            if [ -z "${!VAR}" ]; then
              if [ -z "$MISSING_VARS" ]; then
                MISSING_VARS="$VAR"
              else
                MISSING_VARS="$MISSING_VARS,$VAR"
              fi
            fi
          done

          if [ -n "$MISSING_VARS" ]; then
            echo "Missing variable or secret(s): $MISSING_VARS"
            exit 1
          fi

          ENV="$(printf '%s\n' \
            "PHASE=$PHASE" \
            "DISCORD_BOT_TOKEN=$DISCORD_BOT_TOKEN" \
            "DISCORD_CLIENT_ID=$DISCORD_CLIENT_ID" \
            "DISCORD_CLIENT_SECRET=$DISCORD_CLIENT_SECRET" \
            "APP_ORIGIN=$APP_ORIGIN" \
            "API_ORIGIN=$API_ORIGIN" \
            "JWT_SECRET=$JWT_SECRET" \
            "RDS_INSTANCE_ID=$RDS_INSTANCE_ID" \
            "RDS_REGION=$RDS_REGION")"

          {
            echo "PHASE=$PHASE"
            echo "REF=$REF"
            echo "INSTANCE_IDS=$INSTANCE_IDS"
            echo "ENV<<EOF"
            printf '%s\n' "$ENV"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run
        run: |
          set -euo pipefail
          PHASE="${{ steps.prepare.outputs.PHASE }}"
          REF="${{ steps.prepare.outputs.REF }}"
          INSTANCE_IDS="${{ steps.prepare.outputs.INSTANCE_IDS }}"
          ENV="${{ steps.prepare.outputs.ENV }}"

          COMMANDS_JSON=$(jq -n \
            --arg ref "$REF" \
            --arg repo "/home/ubuntu/trader-bot" \
            --arg env "$ENV" \
            '{commands: (
              ($repo + "/python") as $python_dir |
              ($python_dir + "/.env") as $env_path |
              [
              "set -e",
              ("cd " + $repo),
              ("sudo -u ubuntu git -C " + $repo + " fetch --all --tags"),
              ("sudo -u ubuntu git -C " + $repo + " checkout --detach " + $ref),
              ("sudo install -m 600 -o ubuntu -g ubuntu /dev/null " + $env_path),
              ("sudo -u ubuntu sh -lc " + (("printf %s " + ($env | @sh) + " > " + $env_path) | @sh)),
              ("sudo -u ubuntu bash -lc \"uv sync --frozen --project " + $python_dir + "\"")
            ])}')

          FAILED=0
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "[deploy-python] phase=$PHASE instance=$INSTANCE_ID"
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters "$COMMANDS_JSON" \
              --query "Command.CommandId" \
              --output text)

            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" || FAILED=1

            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '[Status,StandardOutputContent,StandardErrorContent]' \
              --output text
          done

          test "$FAILED" -eq 0

  backend:
    needs: run
    uses: ./.github/workflows/deploy-python-backend.yml
    with:
      phase: ${{ needs.run.outputs.phase }}
      ref: ${{ needs.run.outputs.ref }}
    secrets: inherit

  bot:
    needs: run
    uses: ./.github/workflows/deploy-python-bot.yml
    with:
      phase: ${{ needs.run.outputs.phase }}
      ref: ${{ needs.run.outputs.ref }}
    secrets: inherit
