name: deploy-python

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      phase:
        description: "Phase"
        required: true
      ref:
        description: "Ref"
        required: false
        default: "master"

concurrency:
  group: deploy-python-${{ github.event_name == 'push' && github.ref_name || format('{0}-{1}', inputs.phase, inputs.ref) }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      phase: ${{ steps.prepare.outputs.PHASE }}
      ref: ${{ steps.prepare.outputs.REF }}
      env_content: ${{ steps.prepare.outputs.ENV }}
    steps:
      - name: Prepare
        id: prepare
        env:
          DEPLOY_MAP: ${{ vars.DEPLOY_MAP }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CLIENT_ID: ${{ vars.DISCORD_CLIENT_ID }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF##*/}"
            if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+b[0-9]*$ ]]; then
              PHASE="beta"
            elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              PHASE="prod"
            else
              echo "Invalid tag format: $TAG"
              exit 1
            fi
            REF="$TAG"
          else
            PHASE="${{ inputs.phase }}"
            REF="${{ inputs.ref }}"

            case "$PHASE" in
              beta|prod) ;;
              *)
                echo "Invalid phase: $PHASE"
                exit 1
                ;;
            esac
          fi

          MISSING_DEPLOY_MAP_VALUES=""
          for KEY in backend bot auction domain db_host db_region redis_host; do
            VALUE=$(printf '%s' "$DEPLOY_MAP" | jq -r --arg phase "$PHASE" --arg key "$KEY" '.[$phase][$key] // empty')
            if [ -z "$VALUE" ]; then
              if [ -z "$MISSING_DEPLOY_MAP_VALUES" ]; then
                MISSING_DEPLOY_MAP_VALUES=".${PHASE}.${KEY}"
              else
                MISSING_DEPLOY_MAP_VALUES="$MISSING_DEPLOY_MAP_VALUES,.${PHASE}.${KEY}"
              fi
            fi
          done

          if [ -n "$MISSING_DEPLOY_MAP_VALUES" ]; then
            echo "Missing DEPLOY_MAP value(s): $MISSING_DEPLOY_MAP_VALUES"
            exit 1
          fi

          DOMAIN=$(printf '%s' "$DEPLOY_MAP" | jq -r --arg phase "$PHASE" '.[$phase].domain')
          DB_HOST=$(printf '%s' "$DEPLOY_MAP" | jq -r --arg phase "$PHASE" '.[$phase].db_host')
          DB_REGION=$(printf '%s' "$DEPLOY_MAP" | jq -r --arg phase "$PHASE" '.[$phase].db_region')
          REDIS_HOST=$(printf '%s' "$DEPLOY_MAP" | jq -r --arg phase "$PHASE" '.[$phase].redis_host')

          MISSING_VARS=""
          for VAR in DISCORD_BOT_TOKEN DISCORD_CLIENT_ID DISCORD_CLIENT_SECRET JWT_SECRET; do
            if [ -z "${!VAR}" ]; then
              if [ -z "$MISSING_VARS" ]; then
                MISSING_VARS="$VAR"
              else
                MISSING_VARS="$MISSING_VARS,$VAR"
              fi
            fi
          done

          if [ -n "$MISSING_VARS" ]; then
            echo "Missing variable or secret(s): $MISSING_VARS"
            exit 1
          fi

          APP_ORIGIN="https://$DOMAIN"
          API_ORIGIN="https://$DOMAIN"

          ENV="$(printf '%s\n' \
            "PHASE=$PHASE" \
            "DISCORD_BOT_TOKEN=$DISCORD_BOT_TOKEN" \
            "DISCORD_CLIENT_ID=$DISCORD_CLIENT_ID" \
            "DISCORD_CLIENT_SECRET=$DISCORD_CLIENT_SECRET" \
            "APP_ORIGIN=$APP_ORIGIN" \
            "API_ORIGIN=$API_ORIGIN" \
            "JWT_SECRET=$JWT_SECRET" \
            "DB_HOST=$DB_HOST" \
            "DB_REGION=$DB_REGION" \
            "REDIS_HOST=$REDIS_HOST")"

          {
            echo "PHASE=$PHASE"
            echo "REF=$REF"
            echo "ENV<<EOF"
            printf '%s\n' "$ENV"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  env:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Run
        env:
          DEPLOY_MAP: ${{ vars.DEPLOY_MAP }}
          ENV: ${{ needs.prepare.outputs.env_content }}
        run: |
          set -euo pipefail
          PHASE="${{ needs.prepare.outputs.phase }}"

          ENV_PATH="/home/ubuntu/trader-bot/python/.env"

          COMMANDS_JSON=$(jq -n \
            --arg env "$ENV" \
            --arg env_path "$ENV_PATH" \
            '{commands: [
              "set -e",
              ("install -m 600 -o ubuntu -g ubuntu /dev/null " + $env_path),
              ("sudo -H -u ubuntu sh -lc " + (("printf %s " + ($env | @sh) + " > " + $env_path) | @sh))
            ]}')

          for KEY in backend bot auction; do
            INSTANCE_ID=$(printf '%s' "$DEPLOY_MAP" | jq -er --arg phase "$PHASE" --arg key "$KEY" '.[$phase][$key]')
            echo "[deploy-python-env] phase=$PHASE role=$KEY instance=$INSTANCE_ID"
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters "$COMMANDS_JSON" \
              --query "Command.CommandId" \
              --output text)

            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" || true

            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '[Status,StandardOutputContent,StandardErrorContent]' \
              --output text

            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text)

            test "$STATUS" = "Success"
          done

  backend:
    needs: [prepare, env]
    uses: ./.github/workflows/deploy-python-backend.yml
    with:
      phase: ${{ needs.prepare.outputs.phase }}
      ref: ${{ needs.prepare.outputs.ref }}
    secrets: inherit

  bot:
    needs: [prepare, env]
    uses: ./.github/workflows/deploy-python-bot.yml
    with:
      phase: ${{ needs.prepare.outputs.phase }}
      ref: ${{ needs.prepare.outputs.ref }}
    secrets: inherit

  auction:
    needs: [prepare, env]
    uses: ./.github/workflows/deploy-python-auction.yml
    with:
      phase: ${{ needs.prepare.outputs.phase }}
      ref: ${{ needs.prepare.outputs.ref }}
    secrets: inherit
