name: deploy-python

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      phase:
        description: "Phase(beta, prod)"
        required: true
      ref:
        description: "Git ref (tag/branch/sha)"
        required: true

concurrency:
  group: deploy-python-${{ github.event_name == 'workflow_dispatch' && inputs.phase || github.ref_name }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Prepare
        id: prepare
        env:
          DEPLOY_MAP: ${{ vars.DEPLOY_MAP }}
          BETA_BACKEND_INSTANCE_ID: ${{ vars.BETA_BACKEND_INSTANCE_ID }}
          PROD_BACKEND_INSTANCE_ID: ${{ vars.PROD_BACKEND_INSTANCE_ID }}
          BETA_BOT_INSTANCE_ID: ${{ vars.BETA_BOT_INSTANCE_ID }}
          PROD_BOT_INSTANCE_ID: ${{ vars.PROD_BOT_INSTANCE_ID }}
          BETA_DOMAIN: ${{ vars.BETA_DOMAIN }}
          PROD_DOMAIN: ${{ vars.PROD_DOMAIN }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CLIENT_ID: ${{ vars.DISCORD_CLIENT_ID }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          BETA_RDS_INSTANCE_ID: ${{ vars.BETA_RDS_INSTANCE_ID }}
          PROD_RDS_INSTANCE_ID: ${{ vars.PROD_RDS_INSTANCE_ID }}
          RDS_REGION: ${{ vars.AWS_REGION }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF##*/}"
            if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+b[0-9]*$ ]]; then
              PHASE="beta"
            elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              PHASE="prod"
            else
              echo "Unrecognized tag format: $TAG"
              exit 1
            fi
            REF="$TAG"
          else
            PHASE="${{ inputs.phase }}"
            REF="${{ inputs.ref }}"
          fi

          BACKEND_INSTANCE_KEY=$(printf '%s' "$DEPLOY_MAP" | jq -er --arg phase "$PHASE" '.[$phase].backend')
          BOT_INSTANCE_KEY=$(printf '%s' "$DEPLOY_MAP" | jq -er --arg phase "$PHASE" '.[$phase].bot')
          DOMAIN_KEY=$(printf '%s' "$DEPLOY_MAP" | jq -er --arg phase "$PHASE" '.[$phase].domain')

          BACKEND_INSTANCE_ID="${!BACKEND_INSTANCE_KEY:-}"
          BOT_INSTANCE_ID="${!BOT_INSTANCE_KEY:-}"
          DOMAIN="${!DOMAIN_KEY:-}"

          if [ -z "$BACKEND_INSTANCE_ID" ]; then
            echo "Missing required variable: $BACKEND_INSTANCE_KEY"
            exit 1
          fi
          if [ -z "$BOT_INSTANCE_ID" ]; then
            echo "Missing required variable: $BOT_INSTANCE_KEY"
            exit 1
          fi
          if [ -z "$DOMAIN" ]; then
            echo "Missing required variable: $DOMAIN_KEY"
            exit 1
          fi

          INSTANCE_IDS=$(printf '%s\n%s\n' "$BACKEND_INSTANCE_ID" "$BOT_INSTANCE_ID" | awk 'NF' | sort -u | xargs)

          case "$PHASE" in
            beta)
              RDS_INSTANCE_ID="$BETA_RDS_INSTANCE_ID"
              ;;
            prod)
              RDS_INSTANCE_ID="$PROD_RDS_INSTANCE_ID"
              ;;
          esac

          APP_ORIGIN="https://$DOMAIN"
          API_ORIGIN="https://$DOMAIN"

          MISSING_VARS=""
          for VAR in DISCORD_BOT_TOKEN DISCORD_CLIENT_ID DISCORD_CLIENT_SECRET JWT_SECRET DOMAIN RDS_INSTANCE_ID RDS_REGION; do
            if [ -z "${!VAR}" ]; then
              if [ -z "$MISSING_VARS" ]; then
                MISSING_VARS="$VAR"
              else
                MISSING_VARS="$MISSING_VARS,$VAR"
              fi
            fi
          done

          if [ -n "$MISSING_VARS" ]; then
            echo "Missing required variable or secret(s): $MISSING_VARS"
            exit 1
          fi

          ENV_CONTENT="$(printf '%s\n' \
            "PHASE=$PHASE" \
            "DISCORD_BOT_TOKEN=$DISCORD_BOT_TOKEN" \
            "DISCORD_CLIENT_ID=$DISCORD_CLIENT_ID" \
            "DISCORD_CLIENT_SECRET=$DISCORD_CLIENT_SECRET" \
            "APP_ORIGIN=$APP_ORIGIN" \
            "API_ORIGIN=$API_ORIGIN" \
            "JWT_SECRET=$JWT_SECRET" \
            "RDS_INSTANCE_ID=$RDS_INSTANCE_ID" \
            "RDS_REGION=$RDS_REGION")"

          {
            echo "PHASE=$PHASE"
            echo "REF=$REF"
            echo "INSTANCE_IDS=$INSTANCE_IDS"
            echo "ENV_CONTENT<<EOF"
            printf '%s\n' "$ENV_CONTENT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run
        run: |
          set -euo pipefail
          PHASE="${{ steps.prepare.outputs.PHASE }}"
          REF="${{ steps.prepare.outputs.REF }}"
          INSTANCE_IDS="${{ steps.prepare.outputs.INSTANCE_IDS }}"
          ENV_CONTENT="${{ steps.prepare.outputs.ENV_CONTENT }}"

          COMMANDS_JSON=$(jq -n \
            --arg ref "$REF" \
            --arg repo "/var/www/trader-bot" \
            --arg env_content "$ENV_CONTENT" \
            '{commands: [
              "set -e",
              ("cd " + $repo),
              "sudo -iu ubuntu git fetch --all --tags",
              ("sudo -iu ubuntu git checkout --detach " + $ref),
              "cat <<'"'"'EOF'"'"' > /tmp/deploy-python.sh",
              "set -e",
              "cd /var/www/trader-bot",
              "printf '%"'"'s'"'"' " + ($env_content | @sh) + " > python/.env",
              "chown ubuntu:ubuntu python/.env",
              "chmod 600 python/.env",
              "cd python",
              "uv sync --frozen",
              "EOF",
              "chmod 700 /tmp/deploy-python.sh",
              "sudo -iu ubuntu bash /tmp/deploy-python.sh",
              "rm -f /tmp/deploy-python.sh"
            ]}')

          FAILED=0
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "[deploy-python] phase=$PHASE instance=$INSTANCE_ID"
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters "$COMMANDS_JSON" \
              --query "Command.CommandId" \
              --output text)

            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" || FAILED=1

            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '[Status,StandardOutputContent,StandardErrorContent]' \
              --output text
          done

          test "$FAILED" -eq 0
