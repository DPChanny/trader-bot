name: deploy-instance-backend

on:
  workflow_call:
    inputs:
      phase:
        required: true
        type: string
      ref:
        required: false
        type: string
        default: "origin/master"
  workflow_dispatch:
    inputs:
      phase:
        description: "Phase"
        required: true
      ref:
        description: "Ref"
        required: false
        default: "origin/master"

concurrency:
  group: deploy-instance-backend-${{ inputs.phase }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Prepare
        id: prepare
        env:
          DEPLOY_MAP: ${{ vars.DEPLOY_MAP }}
        run: |
          set -euo pipefail

          PHASE="${{ inputs.phase }}"
          REF="${{ inputs.ref }}"

          case "$PHASE" in
            beta|prod) ;;
            *)
              echo "Invalid phase: $PHASE"
              exit 1
              ;;
          esac

          INSTANCE_ID=$(printf '%s' "$DEPLOY_MAP" | jq -r --arg phase "$PHASE" '.[$phase].backend // empty')

          if [ -z "$INSTANCE_ID" ]; then
            echo "Missing DEPLOY_MAP value: .${PHASE}.backend"
            exit 1
          fi

          {
            echo "PHASE=$PHASE"
            echo "REF=$REF"
            echo "INSTANCE_ID=$INSTANCE_ID"
          } >> "$GITHUB_OUTPUT"

      - name: Run
        run: |
          set -euo pipefail
          PHASE="${{ steps.prepare.outputs.PHASE }}"
          REF="${{ steps.prepare.outputs.REF }}"
          INSTANCE_ID="${{ steps.prepare.outputs.INSTANCE_ID }}"

          COMMANDS_JSON=$(jq -n \
            --arg ref "$REF" \
            --arg phase "$PHASE" \
            --arg repo "/home/ubuntu/trader-bot" \
            '{commands: (
              ($repo + "/infra/cloudwatch/amazon-cloudwatch-agent.d") as $cw_dir |
              ($cw_dir + "/agent.json") as $cw_agent |
              ($cw_dir + "/trader-bot-" + $phase + "-lg-backend.json") as $cw_backend |
              ("/etc/nginx/sites-available/trader-bot-" + $phase + "-nginx.conf") as $nginx_available |
              ("/etc/nginx/sites-enabled/trader-bot-" + $phase + "-nginx.conf") as $nginx_enabled |
              [
              "set -e",
              ("sudo -H -u ubuntu git -C " + $repo + " fetch --prune origin"),
              ("sudo -H -u ubuntu git -C " + $repo + " fetch origin \"+refs/tags/*:refs/tags/*\""),
              ("sudo -H -u ubuntu git -C " + $repo + " checkout --detach " + $ref),
              ("amazon-cloudwatch-agent-ctl -a fetch-config -m ec2 -c file:" + $cw_agent + " -s"),
              ("amazon-cloudwatch-agent-ctl -a append-config -m ec2 -c file:" + $cw_backend),
              "systemctl enable --now amazon-cloudwatch-agent",
              "systemctl is-active --quiet amazon-cloudwatch-agent",
              ("ln -sfn " + $nginx_available + " " + $nginx_enabled),
              "nginx -t",
              "systemctl enable --now nginx",
              "systemctl is-active --quiet nginx",
              "systemctl enable pm2-ubuntu",
              "systemctl is-enabled --quiet pm2-ubuntu"
            ])}')

          echo "[deploy-instance-backend] phase=$PHASE instance=$INSTANCE_ID"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$COMMANDS_JSON" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || true

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '[Status,StandardOutputContent,StandardErrorContent]' \
            --output text

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'Status' \
            --output text)

          test "$STATUS" = "Success"
