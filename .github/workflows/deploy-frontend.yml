name: deploy-frontend

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      phase:
        description: "Phase(beta, prod)"
        required: true
      ref:
        description: "Git ref (tag/branch/sha)"
        required: true

concurrency:
  group: deploy-frontend-${{ github.event_name == 'workflow_dispatch' && inputs.phase || github.ref_name }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Prepare
        id: prepare
        env:
          DEPLOY_MAP: ${{ vars.DEPLOY_MAP }}
          BETA_DOMAIN: ${{ vars.BETA_DOMAIN }}
          PROD_DOMAIN: ${{ vars.PROD_DOMAIN }}
          BETA_S3_BUCKET_NAME: ${{ vars.BETA_S3_BUCKET_NAME }}
          PROD_S3_BUCKET_NAME: ${{ vars.PROD_S3_BUCKET_NAME }}
          BETA_CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.BETA_CLOUDFRONT_DISTRIBUTION_ID }}
          PROD_CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.PROD_CLOUDFRONT_DISTRIBUTION_ID }}
          DISCORD_CLIENT_ID: ${{ vars.DISCORD_CLIENT_ID }}
          GUILD_INVITE_URL: ${{ vars.GUILD_INVITE_URL }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF##*/}"
            if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+b[0-9]*$ ]]; then
              PHASE="beta"
            elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              PHASE="prod"
            else
              echo "Unrecognized tag format: $TAG"
              exit 1
            fi
          else
            PHASE="${{ inputs.phase }}"
          fi

          DOMAIN_KEY=$(echo "$DEPLOY_MAP" | jq -er ".${PHASE}.domain")
          S3_BUCKET_NAME_KEY=$(echo "$DEPLOY_MAP" | jq -er ".${PHASE}.bucket")
          CLOUDFRONT_DISTRIBUTION_ID_KEY=$(echo "$DEPLOY_MAP" | jq -er ".${PHASE}.cloudfront")

          DOMAIN="${!DOMAIN_KEY:-}"
          S3_BUCKET_NAME="${!S3_BUCKET_NAME_KEY:-}"
          CLOUDFRONT_DISTRIBUTION_ID="${!CLOUDFRONT_DISTRIBUTION_ID_KEY:-}"

          MISSING=0
          for V in DISCORD_CLIENT_ID GUILD_INVITE_URL DOMAIN S3_BUCKET_NAME CLOUDFRONT_DISTRIBUTION_ID; do
            if [ -z "${!V}" ]; then
              echo "Missing required variable: $V"
              MISSING=1
            fi
          done
          if [ "$MISSING" -ne 0 ]; then
            exit 1
          fi

          {
            echo "PHASE=$PHASE"
            echo "VITE_API_ORIGIN=https://${DOMAIN}"
            echo "VITE_DISCORD_CLIENT_ID=$DISCORD_CLIENT_ID"
            echo "VITE_GUILD_INVITE_URL=$GUILD_INVITE_URL"
            echo "S3_BUCKET_NAME=$S3_BUCKET_NAME"
            echo "CLOUDFRONT_DISTRIBUTION_ID=$CLOUDFRONT_DISTRIBUTION_ID"
          } >> "$GITHUB_OUTPUT"

      - name: Run
        working-directory: frontend
        env:
          VITE_API_ORIGIN: ${{ steps.prepare.outputs.VITE_API_ORIGIN }}
          VITE_DISCORD_CLIENT_ID: ${{ steps.prepare.outputs.VITE_DISCORD_CLIENT_ID }}
          VITE_GUILD_INVITE_URL: ${{ steps.prepare.outputs.VITE_GUILD_INVITE_URL }}
          S3_BUCKET_NAME: ${{ steps.prepare.outputs.S3_BUCKET_NAME }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ steps.prepare.outputs.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          set -euo pipefail
          npm ci
          npm run build
          cd ..
          aws s3 sync frontend/dist s3://$S3_BUCKET_NAME --delete
          aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --paths "/*"
