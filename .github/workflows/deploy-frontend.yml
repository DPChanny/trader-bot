name: Deploy Frontend

on:
  push:
    tags: ["v*"]
    paths:
      - "frontend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GIT
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SECRET }}
          script: |
            set -e

            cd /var/www/trader-bot
            git fetch --tags origin
            git checkout --detach "${{ github.ref_name }}"

      - name: ENV
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SECRET }}
          script: |
            set -e

            cd /var/www/trader-bot
            cat << EOF > frontend/.env
            VITE_API_ORIGIN=https://${{ vars.EC2_HOST }}
            VITE_WS_ORIGIN=wss://${{ vars.EC2_HOST }}
            VITE_DISCORD_CLIENT_ID=${{ secrets.DISCORD_CLIENT_ID }}
            VITE_GUILD_INVITE_URL=${{ vars.GUILD_INVITE_URL }}
            EOF

      - name: NPM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SECRET }}
          script: |
            set -e

            cd /var/www/trader-bot/frontend
            npm install
            npm run build
