name: deploy-frontend

on:
  push:
    tags: ["v*"]
  workflow_call:
    inputs:
      phase:
        required: true
        type: string
      ref:
        required: false
        type: string
        default: "master"
  workflow_dispatch:
    inputs:
      phase:
        description: "Phase"
        required: true
      ref:
        description: "Ref"
        required: false
        default: "master"

concurrency:
  group: deploy-frontend-${{ github.event_name == 'push' && github.ref_name || format('{0}-{1}', inputs.phase, inputs.ref) }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && inputs.ref || github.ref }}

      - name: Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Prepare
        id: prepare
        env:
          DEPLOY_MAP: ${{ vars.DEPLOY_MAP }}
          DISCORD_CLIENT_ID: ${{ vars.DISCORD_CLIENT_ID }}
          GUILD_INVITE_URL: ${{ vars.GUILD_INVITE_URL }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF##*/}"
            if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+b[0-9]*$ ]]; then
              PHASE="beta"
            elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              PHASE="prod"
            else
              echo "Invalid tag format: $TAG"
              exit 1
            fi
          else
            PHASE="${{ inputs.phase }}"

            case "$PHASE" in
              beta|prod) ;;
              *)
                echo "Invalid phase: $PHASE"
                exit 1
                ;;
            esac
          fi

          MISSING_DEPLOY_MAP_VALUES=""
          for KEY in domain bucket cloudfront; do
            VALUE=$(printf '%s' "$DEPLOY_MAP" | jq -r --arg phase "$PHASE" --arg key "$KEY" '.[$phase][$key] // empty')
            if [ -z "$VALUE" ]; then
              if [ -z "$MISSING_DEPLOY_MAP_VALUES" ]; then
                MISSING_DEPLOY_MAP_VALUES=".${PHASE}.${KEY}"
              else
                MISSING_DEPLOY_MAP_VALUES="$MISSING_DEPLOY_MAP_VALUES,.${PHASE}.${KEY}"
              fi
            fi
          done

          if [ -n "$MISSING_DEPLOY_MAP_VALUES" ]; then
            echo "Missing DEPLOY_MAP value(s): $MISSING_DEPLOY_MAP_VALUES"
            exit 1
          fi

          MISSING_VARS=""
          for VAR in DISCORD_CLIENT_ID GUILD_INVITE_URL; do
            if [ -z "${!VAR}" ]; then
              if [ -z "$MISSING_VARS" ]; then
                MISSING_VARS="$VAR"
              else
                MISSING_VARS="$MISSING_VARS,$VAR"
              fi
            fi
          done
          if [ -n "$MISSING_VARS" ]; then
            echo "Missing variable or secret(s): $MISSING_VARS"
            exit 1
          fi

          DOMAIN=$(printf '%s' "$DEPLOY_MAP" | jq -r --arg phase "$PHASE" '.[$phase].domain')
          S3_BUCKET_NAME=$(printf '%s' "$DEPLOY_MAP" | jq -r --arg phase "$PHASE" '.[$phase].bucket')
          CLOUDFRONT_DISTRIBUTION_ID=$(printf '%s' "$DEPLOY_MAP" | jq -r --arg phase "$PHASE" '.[$phase].cloudfront')

          {
            echo "PHASE=$PHASE"
            echo "VITE_API_ORIGIN=https://${DOMAIN}"
            echo "VITE_DISCORD_CLIENT_ID=$DISCORD_CLIENT_ID"
            echo "VITE_GUILD_INVITE_URL=$GUILD_INVITE_URL"
            echo "S3_BUCKET_NAME=$S3_BUCKET_NAME"
            echo "CLOUDFRONT_DISTRIBUTION_ID=$CLOUDFRONT_DISTRIBUTION_ID"
          } >> "$GITHUB_OUTPUT"

      - name: Run
        working-directory: frontend
        env:
          VITE_PHASE: ${{ steps.prepare.outputs.PHASE }}
          VITE_API_ORIGIN: ${{ steps.prepare.outputs.VITE_API_ORIGIN }}
          VITE_DISCORD_CLIENT_ID: ${{ steps.prepare.outputs.VITE_DISCORD_CLIENT_ID }}
          VITE_GUILD_INVITE_URL: ${{ steps.prepare.outputs.VITE_GUILD_INVITE_URL }}
          S3_BUCKET_NAME: ${{ steps.prepare.outputs.S3_BUCKET_NAME }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ steps.prepare.outputs.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          set -euo pipefail
          npm ci
          npm run build
          cd ..
          aws s3 sync frontend/dist s3://$S3_BUCKET_NAME --delete
          aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --paths "/*"
