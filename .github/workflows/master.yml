name: Deploy Trader Bot

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SECRET }}
          script: |
            set -e

            cd /var/www/trader-bot
            git fetch origin master
            git reset --hard origin/master

            cat << EOF > python/.env
            DISCORD_BOT_TOKEN=${{ secrets.DISCORD_BOT_TOKEN }}
            DISCORD_CLIENT_ID=${{ secrets.DISCORD_CLIENT_ID }}
            DISCORD_CLIENT_SECRET=${{ secrets.DISCORD_CLIENT_SECRET }}
            APP_ORIGIN=https://${{ vars.EC2_HOST }}
            API_ORIGIN=https://${{ vars.EC2_HOST }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DB_HOST=${{ vars.DB_HOST }}
            AWS_REGION=${{ vars.AWS_REGION }}
            EOF

            if [ -n "${{ vars.LOG_LEVEL }}" ]; then
              echo "LOG_LEVEL=${{ vars.LOG_LEVEL }}" >> python/.env
            fi

            cat << EOF > frontend/.env
            VITE_API_ORIGIN=https://${{ vars.EC2_HOST }}
            VITE_WS_ORIGIN=wss://${{ vars.EC2_HOST }}
            VITE_DISCORD_CLIENT_ID=${{ secrets.DISCORD_CLIENT_ID }}
            VITE_DISCORD_SERVER_URL=${{ secrets.DISCORD_SERVER_URL }}
            EOF

            cd python && uv sync && cd ..
            cd frontend && npm install && npm run build && cd ..

            cd python
            pm2 reload trader-bot-api || pm2 start "uv run python -m uvicorn backend.main:app --host localhost --port 8000" --name trader-bot-api
            pm2 reload trader-bot || pm2 start "uv run python -m bot.main" --name trader-bot
            pm2 save
