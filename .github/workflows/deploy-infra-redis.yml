name: deploy-infra-redis

on:
  workflow_call:
    inputs:
      phase:
        required: true
        type: string
      ref:
        required: true
        type: string
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      phase:
        description: "Phase(beta, prod)"
        required: true
      ref:
        description: "Git ref (tag/branch/sha)"
        required: true

concurrency:
  group: deploy-infra-redis-${{ github.event_name == 'push' && github.ref_name || format('{0}-{1}', inputs.phase, inputs.ref) }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Prepare
        id: prepare
        env:
          DEPLOY_MAP: ${{ vars.DEPLOY_MAP }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF##*/}"
            if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+b[0-9]*$ ]]; then
              PHASE="beta"
            elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              PHASE="prod"
            else
              echo "Invalid tag format: $TAG"
              exit 1
            fi
            REF="$TAG"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PHASE="${{ inputs.phase }}"
            REF="${{ inputs.ref }}"
          else
            PHASE="${{ inputs.phase }}"
            REF="${{ inputs.ref }}"
          fi

          REDIS_INSTANCE_ID=$(printf '%s' "$DEPLOY_MAP" | jq -er --arg phase "$PHASE" '.[$phase].redis')

          if [ -z "$REDIS_INSTANCE_ID" ]; then
            echo "Missing DEPLOY_MAP value(s): .${PHASE}.redis"
            exit 1
          fi

          {
            echo "PHASE=$PHASE"
            echo "REF=$REF"
            echo "REDIS_INSTANCE_ID=$REDIS_INSTANCE_ID"
          } >> "$GITHUB_OUTPUT"

      - name: Run
        run: |
          set -euo pipefail
          PHASE="${{ steps.prepare.outputs.PHASE }}"
          REF="${{ steps.prepare.outputs.REF }}"
          REDIS_INSTANCE_ID="${{ steps.prepare.outputs.REDIS_INSTANCE_ID }}"

          COMMANDS_JSON=$(jq -n \
            --arg ref "$REF" \
            --arg repo "/var/www/trader-bot" \
            '{commands: (
              [
              "set -e",
              ("cd " + $repo),
              ("sudo -u ubuntu git -C " + $repo + " fetch --all --tags"),
              ("sudo -u ubuntu git -C " + $repo + " checkout --detach " + $ref),
              "sudo systemctl enable --now redis-server",
              "sudo systemctl is-active --quiet redis-server",
              "redis-cli ping | grep -x PONG"
            ])}')

          echo "[deploy-infra-redis] phase=$PHASE instance=$REDIS_INSTANCE_ID"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$REDIS_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$COMMANDS_JSON" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$REDIS_INSTANCE_ID" || true

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$REDIS_INSTANCE_ID" \
            --query '[Status,StandardOutputContent,StandardErrorContent]' \
            --output text

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$REDIS_INSTANCE_ID" \
            --query 'Status' \
            --output text)

          test "$STATUS" = "Success"
