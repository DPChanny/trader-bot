name: python-bot

on:
  workflow_run:
    workflows: ["python-env"]
    types: [completed]

concurrency:
  group: python
  cancel-in-progress: false

jobs:
  run:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Prepare
        id: prepare
        run: |
          REF="${{ github.event.workflow_run.head_sha }}"
          INSTANCE_IDS=$(printf '%s\n%s\n' \
            "${{ vars.CLOUDWATCH_INSTANCE_ID }}" \
            "${{ vars.PM2_INSTANCE_ID }}" | awk 'NF' | sort -u | xargs)

          {
            echo "REF=$REF"
            echo "INSTANCE_IDS=$INSTANCE_IDS"
          } >> "$GITHUB_OUTPUT"

      - name: Validate
        run: |
          REF="${{ steps.prepare.outputs.REF }}"
          INSTANCE_IDS="${{ steps.prepare.outputs.INSTANCE_IDS }}"

          if [ -z "$REF" ]; then
            echo "Missing ref from prepare"
            exit 1
          fi

          if ! printf '%s' "$REF" | grep -Eq '^[A-Fa-f0-9]{40}$'; then
            echo "Invalid ref format from workflow_run head_sha: $REF"
            exit 1
          fi

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No instance ids provided. Set vars.CLOUDWATCH_INSTANCE_ID and/or vars.PM2_INSTANCE_ID"
            exit 1
          fi

      - name: Run
        run: |
          REF="${{ steps.prepare.outputs.REF }}"
          INSTANCE_IDS="${{ steps.prepare.outputs.INSTANCE_IDS }}"

          COMMANDS_JSON=$(jq -n \
            --arg ref "$REF" \
            --arg repo "/var/www/trader-bot" \
            '{commands: [
              "set -e",
              ("cd " + $repo),
              ("git fetch --tags origin && git checkout --detach " + $ref),
              "cat <<'\''EOF'\'' > /tmp/python-bot.sh",
              "set -e",
              "cd /var/www/trader-bot/python",
              "uv sync --frozen",
              "pm2 startOrReload /var/www/trader-bot/infra/pm2/ecosystem.config.mjs --only trader-bot-prod-pm2-bot",
              "pm2 save",
              "EOF",
              "chmod 700 /tmp/python-bot.sh",
              "sudo -iu ubuntu bash /tmp/python-bot.sh",
              "rm -f /tmp/python-bot.sh"
            ]}')

          FAILED=0
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "[python-bot] instance=$INSTANCE_ID"
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters "$COMMANDS_JSON" \
              --query "Command.CommandId" \
              --output text)

            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" || FAILED=1

            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '[Status,StandardOutputContent,StandardErrorContent]' \
              --output text
          done

          test "$FAILED" -eq 0
