name: python-distribute

on:
  push:
    branches: ["master"]
    tags: ["v*"]
    paths:
      - "python/pyproject.toml"
      - "python/uv.lock"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag/branch/sha)"
        required: true

concurrency:
  group: python
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Prepare
        id: prepare
        env:
          PHASE: ${{ vars.PHASE || 'prod' }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CLIENT_ID: ${{ vars.DISCORD_CLIENT_ID }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
          APP_ORIGIN: https://${{ vars.DOMAIN }}
          API_ORIGIN: https://${{ vars.DOMAIN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RDS_INSTANCE_ID: ${{ vars.RDS_INSTANCE_ID }}
          RDS_REGION: ${{ vars.AWS_REGION }}
        run: |
          INSTANCE_IDS=$(printf '%s\n%s\n' \
            "${{ vars.CLOUDWATCH_INSTANCE_ID }}" \
            "${{ vars.PM2_INSTANCE_ID }}" | awk 'NF' | sort -u | xargs)

          ENV="$(printf '%s\n' \
            "PHASE=$PHASE" \
            "DISCORD_BOT_TOKEN=$DISCORD_BOT_TOKEN" \
            "DISCORD_CLIENT_ID=$DISCORD_CLIENT_ID" \
            "DISCORD_CLIENT_SECRET=$DISCORD_CLIENT_SECRET" \
            "APP_ORIGIN=$APP_ORIGIN" \
            "API_ORIGIN=$API_ORIGIN" \
            "JWT_SECRET=$JWT_SECRET" \
            "RDS_INSTANCE_ID=$RDS_INSTANCE_ID" \
            "RDS_REGION=$RDS_REGION")"

          MISSING_VARS=""
          for VAR in PHASE DISCORD_BOT_TOKEN DISCORD_CLIENT_ID DISCORD_CLIENT_SECRET APP_ORIGIN API_ORIGIN JWT_SECRET RDS_INSTANCE_ID RDS_REGION; do
            if [ -z "${!VAR}" ]; then
              if [ -z "$MISSING_VARS" ]; then
                MISSING_VARS="$VAR"
              else
                MISSING_VARS="$MISSING_VARS,$VAR"
              fi
            fi
          done

          {
            echo "INSTANCE_IDS=$INSTANCE_IDS"
            echo "ENV<<EOF"
            printf '%s\n' "$ENV"
            echo "EOF"
            echo "MISSING_VARS=$MISSING_VARS"
          } >> "$GITHUB_OUTPUT"

      - name: Validate
        run: |
          MISSING=0
          REF="${{ inputs.ref || '' }}"
          MISSING_VARS="${{ steps.prepare.outputs.MISSING_VARS }}"

          INSTANCE_IDS="${{ steps.prepare.outputs.INSTANCE_IDS }}"
          if [ -z "$INSTANCE_IDS" ]; then
            echo "No instance ids provided. Set vars.CLOUDWATCH_INSTANCE_ID and/or vars.PM2_INSTANCE_ID"
            MISSING=1
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -z "$REF" ]; then
              echo "Missing required ref input"
              MISSING=1
            elif ! printf '%s' "$REF" | grep -Eq '^[A-Za-z0-9._/-]+$'; then
              echo "Invalid ref format: $REF"
              MISSING=1
            elif printf '%s' "$REF" | grep -Eq '^-'; then
              echo "Invalid ref format (cannot start with '-') : $REF"
              MISSING=1
            fi
          fi

          ENV="${{ steps.prepare.outputs.ENV }}"
          if [ -z "$ENV" ]; then
            echo "Prepare output env is empty"
            MISSING=1
          fi

          if [ -n "$MISSING_VARS" ]; then
            echo "Missing required variable or secret(s): $MISSING_VARS"
            MISSING=1
          fi

          if [ "$MISSING" -ne 0 ]; then
            exit 1
          fi

      - name: Run
        run: |
          INSTANCE_IDS="${{ steps.prepare.outputs.INSTANCE_IDS }}"
          ENV="${{ steps.prepare.outputs.ENV }}"

          COMMANDS_JSON=$(jq -n \
            --arg repo "/var/www/trader-bot" \
            --arg env "$ENV" \
            '{commands: [
              "set -e",
              ("cd " + $repo),
              "printf '%"'"'s'"'"' " + ($env | @sh) + " > python/.env",
              "chown ubuntu:ubuntu python/.env",
              "chmod 600 python/.env"
            ]}')

          FAILED=0
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "[python-distribute] instance=$INSTANCE_ID"
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters "$COMMANDS_JSON" \
              --query "Command.CommandId" \
              --output text)

            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" || FAILED=1

            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '[Status,StandardOutputContent,StandardErrorContent]' \
              --output text
          done

          test "$FAILED" -eq 0
