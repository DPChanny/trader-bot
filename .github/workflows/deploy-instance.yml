name: deploy-instance

on:
  push:
    branches: ["master"]
    paths:
      - "infra/**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to apply infra from (optional)"
        required: false

concurrency:
  group: deploy-instance
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="master"
          fi
          INSTANCE_ID="${{ vars.EC2_INSTANCE_ID }}"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$(jq -n \
                --arg tag "$TAG" \
                --arg appRoot "/var/www/trader-bot" \
                '{commands: [
                  "set -e",
                  ("cd " + $appRoot),
                  "git fetch --all --tags origin",
                  "if git rev-parse --verify --quiet refs/tags/" + $tag + " >/dev/null; then git checkout --detach " + $tag + "; else git checkout --detach origin/" + $tag + "; fi",
                  "install -d /etc/nginx/sites-available /etc/nginx/sites-enabled",
                  "install -m 644 infra/nginx/sites-avaliable/trader-bot.conf /etc/nginx/sites-available/trader-bot.conf",
                  "ln -sfn /etc/nginx/sites-available/trader-bot.conf /etc/nginx/sites-enabled/trader-bot.conf",
                  "nginx -t",
                  "systemctl reload nginx",
                  "install -d /var/www/trader-bot/python/aws",
                  "ln -sfn /var/www/trader-bot/infra/pm2/ecosystem.config.mjs /var/www/trader-bot/python/aws/ecosystem.config.mjs",
                  "cat <<'\''EOF'\'' > /tmp/trader-bot-bootstrap-pm2.sh",
                  "set -e",
                  "pm2 startup systemd -u ubuntu --hp /home/ubuntu || true",
                  "pm2 save",
                  "EOF",
                  "chmod 700 /tmp/trader-bot-bootstrap-pm2.sh",
                  "sudo -iu ubuntu bash /tmp/trader-bot-bootstrap-pm2.sh",
                  "rm -f /tmp/trader-bot-bootstrap-pm2.sh",
                  "systemctl enable pm2-ubuntu || true",
                  "systemctl restart pm2-ubuntu || true",
                  "install -d /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d",
                  "install -m 644 infra/cloudwatch/amazon-cloudwatch-agent.d/agent.json /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/agent.json",
                  "install -m 644 infra/cloudwatch/amazon-cloudwatch-agent.d/trader-bot-prod-lg-backend.json /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/trader-bot-prod-lg-backend.json",
                  "install -m 644 infra/cloudwatch/amazon-cloudwatch-agent.d/trader-bot-prod-lg-bot.json /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/trader-bot-prod-lg-bot.json",
                  "/opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a stop || true",
                  "/opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a fetch-config -m ec2 -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/agent.json -s",
                  "/opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a append-config -m ec2 -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/trader-bot-prod-lg-backend.json",
                  "/opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a append-config -m ec2 -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/trader-bot-prod-lg-bot.json"
                ]}')}" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || FAILED=1

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '[Status,StandardOutputContent,StandardErrorContent]' \
            --output text

          test -z "$FAILED"
