name: infra-deploy-cloudwatch

on:
  workflow_dispatch:
    inputs:
      instance_ids:
        description: "Target EC2 instance ids (comma or space separated)"
        required: false
      tag:
        description: "Tag or branch to apply (default: master)"
        required: false
      profile:
        description: "CloudWatch profile to apply: backend, bot, all"
        required: false

concurrency:
  group: infra-deploy-cloudwatch
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.INFRA_AWS_REGION }}

      - name: Deploy
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="master"
          fi
          PROFILE="${{ inputs.profile || 'all' }}"
          INSTANCE_IDS_RAW="${{ inputs.instance_ids || vars.INFRA_CLOUDWATCH_INSTANCE_ID }}"
          INSTANCE_IDS=$(echo "$INSTANCE_IDS_RAW" | tr ',\n' '  ' | xargs)

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No instance ids provided. Set input instance_ids or vars.INFRA_CLOUDWATCH_INSTANCE_ID"
            exit 1
          fi

          case "$PROFILE" in
            backend|bot|all)
              ;;
            *)
              echo "Invalid profile: $PROFILE (expected backend, bot, all)"
              exit 1
              ;;
          esac

          FAILED=0
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "[infra-deploy-cloudwatch] instance=$INSTANCE_ID profile=$PROFILE"
            COMMANDS_JSON=$(jq -n \
              --arg tag "$TAG" \
              --arg appRoot "/var/www/trader-bot" \
              --arg profile "$PROFILE" \
              '{commands: [
                "set -e",
                ("cd " + $appRoot),
                "git fetch --all --tags origin",
                "if git rev-parse --verify --quiet refs/tags/" + $tag + " >/dev/null; then git checkout --detach " + $tag + "; else git checkout --detach origin/" + $tag + "; fi",
                "install -d /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d",
                "install -m 644 infra/cloudwatch/amazon-cloudwatch-agent.d/agent.json /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/agent.json",
                "if [ \"" + $profile + "\" = \"backend\" ] || [ \"" + $profile + "\" = \"all\" ]; then install -m 644 infra/cloudwatch/amazon-cloudwatch-agent.d/trader-bot-prod-lg-backend.json /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/trader-bot-prod-lg-backend.json; fi",
                "if [ \"" + $profile + "\" = \"bot\" ] || [ \"" + $profile + "\" = \"all\" ]; then install -m 644 infra/cloudwatch/amazon-cloudwatch-agent.d/trader-bot-prod-lg-bot.json /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/trader-bot-prod-lg-bot.json; fi",
                "/opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a fetch-config -m ec2 -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/agent.json -s",
                "if [ \"" + $profile + "\" = \"backend\" ] || [ \"" + $profile + "\" = \"all\" ]; then /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a append-config -m ec2 -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/trader-bot-prod-lg-backend.json; fi",
                "if [ \"" + $profile + "\" = \"bot\" ] || [ \"" + $profile + "\" = \"all\" ]; then /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a append-config -m ec2 -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/trader-bot-prod-lg-bot.json; fi"
              ]}')

            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters "$COMMANDS_JSON" \
              --query "Command.CommandId" \
              --output text)

            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" || FAILED=1

            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '[Status,StandardOutputContent,StandardErrorContent]' \
              --output text
          done

          test "$FAILED" -eq 0
