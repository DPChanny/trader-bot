name: infra-deploy-cloudwatch

on:
  push:
    paths:
      - "infra/cloudwatch/**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version"
        required: true
      target:
        description: "Target(backend, bot, all)"
        required: false
        default: "all"

concurrency:
  group: infra-deploy-cloudwatch
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF="${{ inputs.tag }}"
            TARGET="${{ inputs.target || 'all' }}"
          else
            REF="${{ github.sha }}"
            TARGET="all"
          fi

            if [ "$TARGET" = "bot" ]; then
              INSTANCE_IDS=$(printf '%s\n%s\n' \
                "${{ vars.CLOUDWATCH_INSTANCE_ID }}" \
                "${{ vars.PM2_INSTANCE_ID }}" | awk 'NF' | sort -u | xargs)
            else
              INSTANCE_IDS=$(printf '%s\n%s\n%s\n' \
                "${{ vars.NGINX_INSTANCE_ID }}" \
                "${{ vars.CLOUDWATCH_INSTANCE_ID }}" \
                "${{ vars.PM2_INSTANCE_ID }}" | awk 'NF' | sort -u | xargs)
            fi

          if [ -z "$INSTANCE_IDS" ]; then
              if [ "$TARGET" = "bot" ]; then
                echo "No instance ids provided. Set vars.CLOUDWATCH_INSTANCE_ID and/or vars.PM2_INSTANCE_ID"
              else
                echo "No instance ids provided. Set vars.NGINX_INSTANCE_ID and/or vars.CLOUDWATCH_INSTANCE_ID and/or vars.PM2_INSTANCE_ID"
              fi
            exit 1
          fi

          case "$TARGET" in
            backend|bot|all)
              ;;
            *)
              echo "Invalid target: $TARGET (expected backend, bot, all)"
              exit 1
              ;;
          esac

          FAILED=0
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "[infra-deploy-cloudwatch] instance=$INSTANCE_ID target=$TARGET"
            COMMANDS_JSON=$(jq -n \
              --arg ref "$REF" \
              --arg appRoot "/var/www/trader-bot" \
              --arg target "$TARGET" \
              '{commands: [
                "set -e",
                ("cd " + $appRoot),
                ("git fetch --all --tags origin && git checkout --detach " + $ref),
                "install -d /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d",
                "install -m 644 infra/cloudwatch/amazon-cloudwatch-agent.d/agent.json /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/agent.json",
                "if [ \"" + $target + "\" = \"backend\" ] || [ \"" + $target + "\" = \"all\" ]; then install -m 644 infra/cloudwatch/amazon-cloudwatch-agent.d/trader-bot-prod-lg-backend.json /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/trader-bot-prod-lg-backend.json; fi",
                "if [ \"" + $target + "\" = \"bot\" ] || [ \"" + $target + "\" = \"all\" ]; then install -m 644 infra/cloudwatch/amazon-cloudwatch-agent.d/trader-bot-prod-lg-bot.json /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/trader-bot-prod-lg-bot.json; fi",
                "/opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a fetch-config -m ec2 -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/agent.json -s",
                "if [ \"" + $target + "\" = \"backend\" ] || [ \"" + $target + "\" = \"all\" ]; then /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a append-config -m ec2 -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/trader-bot-prod-lg-backend.json; fi",
                "if [ \"" + $target + "\" = \"bot\" ] || [ \"" + $target + "\" = \"all\" ]; then /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a append-config -m ec2 -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.d/trader-bot-prod-lg-bot.json; fi"
              ]}')

            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters "$COMMANDS_JSON" \
              --query "Command.CommandId" \
              --output text)

            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" || FAILED=1

            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '[Status,StandardOutputContent,StandardErrorContent]' \
              --output text
          done

          test "$FAILED" -eq 0
