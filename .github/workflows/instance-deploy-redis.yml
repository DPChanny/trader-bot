name: instance-deploy-redis

on:
  workflow_dispatch:
    inputs:
      instance_id:
        description: "Target EC2 instance id"
        required: true

concurrency:
  group: instance-deploy-redis
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.INSTANCE_AWS_REGION }}

      - name: Deploy
        run: |
          INSTANCE_ID="${{ inputs.instance_id }}"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$(jq -n \
                '{commands: [
                  "set -e",
                  "if systemctl list-unit-files | grep -q '^redis-server.service'; then systemctl enable redis-server; systemctl restart redis-server; systemctl --no-pager --full status redis-server; elif systemctl list-unit-files | grep -q '^redis.service'; then systemctl enable redis; systemctl restart redis; systemctl --no-pager --full status redis; else echo '\''redis service not found (expected redis-server or redis)'\''; exit 1; fi"
                ]}')}" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || FAILED=1

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '[Status,StandardOutputContent,StandardErrorContent]' \
            --output text

          test -z "$FAILED"
