name: python-deploy-backend

on:
  push:
    tags: ["v*"]
  workflow_run:
    workflows: ["python-deploy-env"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy"
        required: true

concurrency:
  group: python-deploy-runtime-${{ vars.APP_EC2_INSTANCE_ID }}
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.APP_AWS_REGION }}

      - name: Deploy
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            REF="${{ github.event.workflow_run.head_sha }}"
          else
            REF="${{ inputs.tag || github.ref_name }}"
          fi
          INSTANCE_ID="${{ vars.APP_EC2_INSTANCE_ID }}"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$(jq -n \
                --arg ref "$REF" \
                --arg appRoot "/var/www/trader-bot" \
                '{commands: [
                  "set -e",
                  ("cd " + $appRoot),
                  ("git fetch --tags origin && git checkout --detach " + $ref),
                  "cat <<'\''EOF'\'' > /tmp/trader-bot-deploy-backend.sh",
                  "set -e",
                  "cd /var/www/trader-bot/python",
                  "uv sync --frozen",
                  "pm2 startOrReload /var/www/trader-bot/infra/pm2/ecosystem.config.mjs --only trader-bot-prod-pm2-backend",
                  "pm2 save",
                  "EOF",
                  "chmod 700 /tmp/trader-bot-deploy-backend.sh",
                  "sudo -iu ubuntu bash /tmp/trader-bot-deploy-backend.sh",
                  "rm -f /tmp/trader-bot-deploy-backend.sh"
                ]}')" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || FAILED=1

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '[Status,StandardOutputContent,StandardErrorContent]' \
            --output text

          test -z "$FAILED"
