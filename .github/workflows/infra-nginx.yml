name: infra-nginx

on:
  push:
    paths:
      - "infra/nginx/**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version"
        required: true

concurrency:
  group: infra
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Credential
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Prepare
        id: prepare
        run: |
          TARGET="backend"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF="${{ inputs.tag }}"
          else
            REF="${{ github.sha }}"
          fi

          INSTANCE_IDS=$(printf '%s\n' "${{ vars.NGINX_INSTANCE_ID }}" | awk 'NF' | sort -u | xargs)

          {
            echo "target=$TARGET"
            echo "ref=$REF"
            echo "instance_ids=$INSTANCE_IDS"
          } >> "$GITHUB_OUTPUT"

      - name: Validate
        run: |
          TARGET="${{ steps.prepare.outputs.target }}"
          REF="${{ steps.prepare.outputs.ref }}"
          INSTANCE_IDS="${{ steps.prepare.outputs.instance_ids }}"

          if [ "$TARGET" != "backend" ]; then
            echo "Invalid target: $TARGET (expected backend)"
            exit 1
          fi

          if [ -z "$REF" ]; then
            echo "Missing ref from prepare"
            exit 1
          fi

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No instance ids provided. Set vars.NGINX_INSTANCE_ID"
            exit 1
          fi

      - name: Run
        run: |
          TARGET="${{ steps.prepare.outputs.target }}"
          REF="${{ steps.prepare.outputs.ref }}"
          INSTANCE_IDS="${{ steps.prepare.outputs.instance_ids }}"

          COMMANDS_JSON=$(jq -n \
            --arg ref "$REF" \
            --arg repo "/var/www/trader-bot" \
            '{commands: [
              "set -e",
              ("sudo -iu ubuntu bash -lc " + ("set -e\ncd " + $repo + "\ngit fetch --all --tags\ngit checkout --detach " + $ref | @sh)),
              "sudo install -m 644 infra/nginx/sites-available/trader-bot.conf /etc/nginx/sites-available/trader-bot.conf",
              "sudo ln -sfn /etc/nginx/sites-available/trader-bot.conf /etc/nginx/sites-enabled/trader-bot.conf",
              "sudo nginx -t",
              "sudo systemctl enable nginx",
              "if sudo systemctl is-active --quiet nginx; then",
              "  sudo systemctl reload nginx",
              "else",
              "  sudo systemctl start nginx",
              "fi"
            ]}')

          FAILED=0
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "[infra-nginx] instance=$INSTANCE_ID target=$TARGET"
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters "$COMMANDS_JSON" \
              --query "Command.CommandId" \
              --output text)

            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" || FAILED=1

            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '[Status,StandardOutputContent,StandardErrorContent]' \
              --output text
          done

          test "$FAILED" -eq 0
